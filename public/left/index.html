<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>Field Studies — Left Screen</title>
  <script>
    // Wall-mount rotation: `?rotate=cw` means the physical TV is mounted
    // rotated 90° clockwise, so counter-rotate the body. Run before the
    // stylesheet so there is no pre-rotation flash.
    if (new URLSearchParams(location.search).get('rotate') === 'cw') {
      document.documentElement.classList.add('rotated');
    }
  </script>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    /* ========================================
       Screen Left — Accordion scroll list
       ======================================== */

    body {
      background-color: var(--black);
    }

    /* --- Scroll viewport (clips the track) --- */

    .scroll-viewport {
      width: var(--screen-w);
      height: var(--screen-h);
      position: relative;
      overflow: hidden;
      background-color: var(--black);
    }

    .scroll-track {
      position: relative;
      will-change: transform;
    }

    /* ----------------------------------------
       Cover item — always full vh, first in list
       ---------------------------------------- */

    .scroll-item--cover {
      height: var(--screen-h);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px 72px;
    }

    .cover__top {
      display: flex;
      flex-direction: column;
    }

    .cover__logo {
      width: 180px;
      margin-bottom: 60px;
      color: var(--cover-text);
      display: block;
    }

    .cover__logo svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .cover__title {
      font-family: var(--font-family);
      font-weight: 700;
      font-size: 220px;
      line-height: 0.85;
      letter-spacing: -0.02em;
      color: var(--cover-text);
    }

    .cover__title--review {
      margin-top: 20px;
    }

    .cover__bottom {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .cover__subtitle {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 20px;
      line-height: 1.6;
      letter-spacing: 0.02em;
      color: var(--cover-text-dim);
      max-width: 560px;
    }

    .cover__edition {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cover-text-dim);
    }

    /* ----------------------------------------
       Project items — title bar + collapsible body
       ---------------------------------------- */

    .scroll-item__bar {
      padding: 44px 72px 48px;
      position: relative;
    }

    /* Thin top separator */
    .scroll-item__bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 72px;
      right: 72px;
      height: 1px;
      background-color: var(--cover-text-dim);
      opacity: 0.2;
    }

    .scroll-item__name {
      font-family: var(--font-family);
      font-weight: 700;
      font-size: 110px;
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--cover-text);
      display: block;
      transition: opacity 0.5s ease;
    }

    .scroll-item__location {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: 0.02em;
      color: var(--cover-text-dim);
      margin-top: 24px;
    }

    /* --- Collapsible body (accordion, dark register) --- */

    .scroll-item__body {
      height: 0;
      overflow: hidden;
    }

    .scroll-item__body-inner {
      position: relative;
      height: calc(var(--screen-h) - 260px);
    }

    /* ----------------------------------------
       Layer 1: Meta info (top-left, subtle)
       ---------------------------------------- */

    .body__meta {
      position: absolute;
      top: 40px;
      left: 72px;
      right: 72px;
      z-index: 2;
    }

    .body__code {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 14px;
      line-height: 1.4;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cover-text-dim);
      margin-bottom: 10px;
    }

    .body__architect {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 20px;
      line-height: 1.4;
      color: var(--cover-text);
    }

    .body__quote {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 36px;
      line-height: 1.4;
      color: var(--cover-text);
      max-width: 720px;
      margin-top: 32px;
    }

    .body__quote-author {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 18px;
      line-height: 1.4;
      color: var(--cover-text-dim);
      opacity: 0.7;
      margin-top: 12px;
    }

    /* ----------------------------------------
       Layer 2: Planimetry (centered V+H)
       ---------------------------------------- */

    .body__plan {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      padding: 120px 72px 100px;
      color: var(--cover-text-dim);
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .body__plan svg {
      width: 100%;
      height: 100%;
      max-width: 1200px;
      max-height: 1200px;
    }

    /* Override dot label font (SVG ships with BaselGrotesk) */
    .body__plan svg #numeri text,
    .body__plan svg #numeri tspan {
      font-family: Helvetica, Arial, sans-serif !important;
    }

    /* Placeholder border (dev only) */
    .body__plan-placeholder {
      width: 600px;
      height: 500px;
      border: 1px solid rgba(160, 154, 144, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ----------------------------------------
       Layer 3: Products overlay (bottom, grows upward)
       ---------------------------------------- */

    .body__products {
      position: absolute;
      bottom: 40px;
      left: 72px;
      right: 72px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .product-item {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(160, 154, 144, 0.10);
    }

    .product-item:first-child {
      border-top: 1px solid rgba(160, 154, 144, 0.10);
    }

    .product-item__number {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.15em;
      color: var(--cover-text-dim);
      min-width: 28px;
    }

    .product-item__name {
      font-family: var(--font-family);
      font-weight: 500;
      font-size: 20px;
      color: var(--cover-text);
    }

    .product-item__type {
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 18px;
      color: var(--cover-text-dim);
      margin-left: auto;
    }
  </style>
</head>
<body>

      <div class="scroll-item scroll-item--cover" id="coverItem">

            <title>Agape</title>
          </div>
          <div>
            <div class="cover__title">Field<br>Studies</div>
            <div class="cover__title cover__title--review">Design<br>Review</div>

        </div>
        <div class="cover__bottom">
          <div class="cover__subtitle">
            A sophisticated modern atlas of architectural references presenting residential projects where Agape products are installed.

      <!-- Project items generated by JS -->

    </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/projects.js"></script>
  <script src="../shared/timeline.js"></script>
  <script src="../shared/sync.js"></script>
  <script>
    /**
     * Screen Left — Accordion scroll controller
     *
     * The entire SX is a vertical scroll list:
     *   [cover — full vh] [project 1 bar] [project 2 bar] ...
     *
     * Each project bar has a collapsible body (accordion).
     * The loop: show cover → scroll to project → open → hold → close → next → ... → back to cover.
     */

    (function () {
      'use strict';

      var scrollTrack = document.getElementById('scrollTrack');
      var coverItem = document.getElementById('coverItem');

      // =============================================
      // 1. Generate project items from data
      // =============================================

      var projectItems = [];

      PROJECTS.forEach(function (project, idx) {
        var item = document.createElement('div');
        item.className = 'scroll-item';
        item.dataset.index = idx;

        // --- Title bar (dark register) ---
        var bar = document.createElement('div');
        bar.className = 'scroll-item__bar';

        var name = document.createElement('span');
        name.className = 'scroll-item__name';
        name.textContent = project.title;
        bar.appendChild(name);

        var loc = document.createElement('span');
        loc.className = 'scroll-item__location';
        loc.textContent = project.location;
        bar.appendChild(loc);

        item.appendChild(bar);

        // --- Collapsible body (dark register, layered layout) ---
        var body = document.createElement('div');
        body.className = 'scroll-item__body';

        var inner = document.createElement('div');
        inner.className = 'scroll-item__body-inner';

        // Layer 1: Meta info (top)
        var meta = document.createElement('div');
        meta.className = 'body__meta';

        var code = document.createElement('div');
        code.className = 'body__code';
        code.textContent = project.code + '  \u2014  ' + project.pages;
        meta.appendChild(code);

        var arch = document.createElement('div');
        arch.className = 'body__architect';
        arch.textContent = project.architect;
        meta.appendChild(arch);

        if (project.quote && project.quote.text) {
          var quote = document.createElement('div');
          quote.className = 'body__quote';
          quote.textContent = '\u201C' + project.quote.text + '\u201D';
          meta.appendChild(quote);

          var quoteAuthor = document.createElement('div');
          quoteAuthor.className = 'body__quote-author';
          quoteAuthor.textContent = '\u2014 ' + project.quote.author;
          meta.appendChild(quoteAuthor);
        }

        inner.appendChild(meta);

        // Layer 2: Planimetry (centered V+H)
        var plan = document.createElement('div');
        plan.className = 'body__plan';
        var planPlaceholder = document.createElement('div');
        planPlaceholder.className = 'body__plan-placeholder';
        planPlaceholder.textContent = 'planimetry \u2014 ' + project.id;
        plan.appendChild(planPlaceholder);
        inner.appendChild(plan);

        // Layer 3: Products overlay (bottom, grows upward)
        var products = document.createElement('div');
        products.className = 'body__products';
        var productItemEls = [];
        project.products.forEach(function (prod) {
          var row = document.createElement('div');
          row.className = 'product-item';
          row.innerHTML =
            '<span class="product-item__number">' + prod.number + '</span>' +
            '<span class="product-item__name">' + prod.name + '</span>' +
            '<span class="product-item__type">' + prod.type + '</span>';
          products.appendChild(row);
          productItemEls.push(row);
        });
        inner.appendChild(products);

        body.appendChild(inner);
        item.appendChild(body);
        scrollTrack.appendChild(item);

        projectItems.push({
          el: item,
          bar: bar,
          nameEl: name,
          body: body,
          inner: inner,
          meta: meta,
          plan: plan,
          productsEl: products,
          productItemEls: productItemEls,
        });
      });

      // =============================================
      // 2. Clone bars for infinite-loop sweep
      // =============================================
      // A lightweight copy of all bars is appended below the real
      // content. Sweeps animate downward through the clones (track
      // translates up, items enter from the bottom — the natural
      // vertical-scroll direction) and snap back to the real element.

      var cloneFrag = document.createDocumentFragment();
      var coverClone = coverItem.cloneNode(true);
      coverClone.removeAttribute('id');
      cloneFrag.appendChild(coverClone);

      PROJECTS.forEach(function (project) {
        var ci = document.createElement('div');
        ci.className = 'scroll-item';
        var cb = document.createElement('div');
        cb.className = 'scroll-item__bar';
        cb.innerHTML =
          '<span class="scroll-item__name">' + project.title + '</span>' +
          '<span class="scroll-item__location">' + project.location + '</span>';
        ci.appendChild(cb);
        cloneFrag.appendChild(ci);
      });

      scrollTrack.appendChild(cloneFrag);

      // Reference the first cloned element so we can measure the
      // content block height after layout (see init).
      var firstCloneEl = coverClone;

      // blockHeight = height of one full set (clone block).
      // Measured in init after layout; first clone sits at this offset.
      var blockHeight = 0;

      // =============================================
      // 3. SVG plan preloading
      // =============================================

      var svgCache = {};

      /** Resolve a plan path: absolute URL returned as-is, relative gets `../` prefix. */
      function resolvePlanUrl(p) {
        return /^https?:\/\//.test(p) ? p : '../' + p;
      }

      /** Fetch one SVG path, resolve with '' on failure. */
      function fetchSvg(p) {
        return fetch(resolvePlanUrl(p))
          .then(function (r) { return r.ok ? r.text() : ''; })
          .catch(function () { return ''; });
      }

      function preloadPlans() {
        var promises = PROJECTS.map(function (project) {
          var plan = project.plan;
          if (Array.isArray(plan)) {
            // Fetch all; pick the largest by text length (probably the main bathroom)
            return Promise.all(plan.map(fetchSvg)).then(function (texts) {
              var best = texts.reduce(function (a, b) {
                return b.length > a.length ? b : a;
              }, '');
              svgCache[project.id] = best;
            });
          }
          return fetchSvg(plan).then(function (text) {
            svgCache[project.id] = text;
          });
        });
        return Promise.all(promises);
      }

      /**
       * Prepare stroke-draw on all shape elements in a group.
       * For filled elements: saves original fill, sets fill to transparent,
       * ensures a visible stroke exists for the draw animation.
       * Returns { strokeEls, filledEls } — filledEls have ._origFill set.
       */
      function prepareStrokeDraw(group) {
        if (!group) return { strokeEls: [], filledEls: [] };
        var shapeTags = ['path', 'line', 'polyline', 'polygon', 'circle', 'ellipse', 'rect'];
        var els = Array.from(group.querySelectorAll(shapeTags.join(',')));

        var strokeEls = [];
        var filledEls = [];

        els.forEach(function (el) {
          if (typeof el.getTotalLength !== 'function') return;

          var computed = window.getComputedStyle(el);
          var hasStroke = computed.stroke && computed.stroke !== 'none';
          var fillVal = computed.fill;
          var hasFill = fillVal && fillVal !== 'none' && fillVal !== 'transparent'
            && fillVal !== 'rgba(0, 0, 0, 0)';

          if (hasFill) {
            // Save original fill, make transparent, ensure stroke for outline draw
            el._origFill = fillVal;
            el.style.fill = 'transparent';
            if (!hasStroke) {
              // Add a thin stroke matching the fill so outline is visible during draw
              el.style.stroke = fillVal;
              el.style.strokeWidth = '0.5';
            }
            var len = el.getTotalLength();
            el.style.strokeDasharray = len;
            el.style.strokeDashoffset = len;
            filledEls.push(el);
          } else if (hasStroke) {
            var len = el.getTotalLength();
            el.style.strokeDasharray = len;
            el.style.strokeDashoffset = len;
            strokeEls.push(el);
          }
        });

        return { strokeEls: strokeEls, filledEls: filledEls };
      }

      function injectPlanSVG(planContainer, projectId) {
        var svgStr = svgCache[projectId];
        if (!svgStr) return null;

        var parser = new DOMParser();
        var doc = parser.parseFromString(svgStr, 'image/svg+xml');
        var svg = doc.querySelector('svg');
        if (!svg) return null;

        // Kill any stray tweens left on the previous SVG and drop it.
        // Many plan SVGs share `id="piante"`, `id="prodotti"`, etc., so
        // leaving multiple in the DOM lets `url(#…)` references cross-
        // resolve between projects and corrupts fills/strokes/dashes.
        gsap.killTweensOf(planContainer.querySelectorAll('*'));
        planContainer.innerHTML = '';
        planContainer.appendChild(svg);

        // Detect format: new (id="piante"/"prodotti") or legacy (class="plan-*")
        var pianteGroup = svg.querySelector('#piante');
        var prodottiGroup = svg.querySelector('#prodotti');
        var isNewFormat = !!(pianteGroup || prodottiGroup);

        var pianteData = { strokeEls: [], filledEls: [] };

        if (isNewFormat) {
          if (pianteGroup) {
            pianteData = prepareStrokeDraw(pianteGroup);
          }
          if (prodottiGroup) {
            gsap.set(prodottiGroup, { opacity: 0 });
          }
        }

        // Legacy layers
        var legacyLayers = [];
        if (!isNewFormat) {
          ['plan-perimeter', 'plan-partitions', 'plan-fixtures'].forEach(function (cls) {
            var group = svg.querySelector('.' + cls);
            var data = prepareStrokeDraw(group);
            legacyLayers.push(data.strokeEls.concat(data.filledEls));
          });
        }

        // Numbered dots: new format uses #bollini / #Livello_5 / #testi for circles
        // and #numeri for labels. Legacy uses .plan-dots.
        var circlesGroup = svg.querySelector('#bollini')
          || svg.querySelector('#Livello_5')
          || svg.querySelector('#testi')
          || svg.querySelector('.plan-dots');
        var numbersGroup = svg.querySelector('#numeri');
        var dotCircles = circlesGroup ? Array.from(circlesGroup.children) : [];
        var dotNumbers = numbersGroup ? Array.from(numbersGroup.children) : [];
        var dotEls = dotCircles.concat(dotNumbers);
        gsap.set(dotEls, { scale: 0, transformOrigin: '50% 50%' });

        return {
          svg: svg,
          isNewFormat: isNewFormat,
          pianteData: pianteData,
          prodottiGroup: prodottiGroup,
          legacyLayers: legacyLayers,
          dotEls: dotEls,
          dotCircles: dotCircles,
          dotNumbers: dotNumbers,
        };
      }

      function addPlanimetryToTimeline(tl, planData, baseOffset) {
        if (!planData) return;

        var ease = CONFIG.ease.planDraw;

        if (planData.isNewFormat) {
          var pd = planData.pianteData;
          var allStroke = pd.strokeEls.concat(pd.filledEls);
          var buildDur = CONFIG.t1.planimetryBuild;

          // Phase 1: stroke-draw all outlines (stroked + filled elements)
          if (allStroke.length) {
            tl.to(allStroke, {
              strokeDashoffset: 0,
              duration: buildDur,
              ease: ease,
              stagger: 0.02,
            }, baseOffset + 0.3);
          }

          // Phase 2: fill in the filled elements — delayed, slow fade
          if (pd.filledEls.length) {
            tl.to(pd.filledEls, {
              fill: function (i) { return pd.filledEls[i]._origFill; },
              duration: 2.8,
              ease: 'power2.out',
              stagger: 0.05,
            }, baseOffset + buildDur * 0.95);
          }

          // Phase 3: prodotti fade in
          if (planData.prodottiGroup) {
            tl.to(planData.prodottiGroup, {
              opacity: 1,
              duration: 1.5,
              ease: 'power2.out',
            }, baseOffset + buildDur * 1.05);
          }

          // Phase 4: numbered dots — circles + numbers pop in as pairs, sequentially
          var dotsStart = baseOffset + buildDur * 1.2;
          var dotStagger = 0.28;
          var dotDur = 0.35;
          if (planData.dotCircles.length) {
            tl.to(planData.dotCircles, {
              scale: 1,
              duration: dotDur,
              stagger: dotStagger,
              ease: 'back.out(1.7)',
            }, dotsStart);
          }
          if (planData.dotNumbers.length) {
            tl.to(planData.dotNumbers, {
              scale: 1,
              duration: dotDur,
              stagger: dotStagger,
              ease: 'back.out(1.7)',
            }, dotsStart);
          }
        } else {
          // Legacy format
          var delays = CONFIG.t1.planimetryDelay;

          if (planData.legacyLayers[0] && planData.legacyLayers[0].length) {
            tl.to(planData.legacyLayers[0], {
              strokeDashoffset: 0,
              duration: 2.0,
              ease: ease,
            }, baseOffset + delays.perimeter);
          }
          if (planData.legacyLayers[1] && planData.legacyLayers[1].length) {
            tl.to(planData.legacyLayers[1], {
              strokeDashoffset: 0,
              duration: 1.5,
              ease: ease,
            }, baseOffset + delays.partitions);
          }
          if (planData.legacyLayers[2] && planData.legacyLayers[2].length) {
            tl.to(planData.legacyLayers[2], {
              strokeDashoffset: 0,
              duration: 2.0,
              ease: ease,
            }, baseOffset + delays.fixtures);
          }
          if (planData.dotEls.length) {
            tl.to(planData.dotEls, {
              scale: 1,
              duration: 0.4,
              stagger: 0.12,
              ease: 'back.out(1.7)',
            }, baseOffset + delays.dots);
          }
        }
      }

      // =============================================
      // 4. GSAP helpers (promise-based)
      // =============================================

      function animate(target, vars) {
        return new Promise(function (resolve) {
          gsap.to(target, Object.assign({}, vars, { onComplete: resolve }));
        });
      }

      function tlPromise(tl) {
        return new Promise(function (resolve) {
          tl.eventCallback('onComplete', resolve);
        });
      }

      function delay(seconds) {
        return new Promise(function (resolve) {
          setTimeout(resolve, seconds * 1000);
        });
      }

      // =============================================
      // 5. Scroll helpers
      // =============================================

      function scrollTo(el) {
        var targetY = -(el.offsetTop);
        var currentY = gsap.getProperty(scrollTrack, 'y') || 0;
        var distance = Math.abs(targetY - currentY);
        var duration = Math.max(0.8, Math.min(2.2, 0.6 + (distance / 1800)));

        return animate(scrollTrack, {
          y: targetY,
          duration: duration,
          ease: 'power3.inOut',
        });
      }

      /**
       * Infinite-loop sweep: scrolls downward continuously through all
       * titles (via clone block), then snaps back to the real element.
       * Every transition shows the full catalogue index.
       */
      function sweepLoop(targetEl) {
        var realTargetY = -(targetEl.offsetTop);
        var currentY = gsap.getProperty(scrollTrack, 'y') || 0;

        // Clones sit AFTER real content, so clone of target is one
        // blockHeight further into the track (more negative y).
        var cloneTargetY = realTargetY - blockHeight;

        // Downward distance
        var dist = Math.abs(cloneTargetY - currentY);
        var duration = Math.max(2.0, Math.min(4.5, 1.0 + dist / 3000));

        return animate(scrollTrack, {
          y: cloneTargetY,
          duration: duration,
          ease: 'power3.inOut',
        }).then(function () {
          // Snap to real position (visually identical)
          gsap.set(scrollTrack, { y: realTargetY });
        });
      }

      // =============================================
      // 6. Accordion open / close
      // =============================================

      function openAccordion(item, projectId) {
        var body = item.body;
        var meta = item.meta;
        var plan = item.plan;
        var productsEl = item.productsEl;
        var productItemEls = item.productItemEls;

        // Prepare: all layers invisible
        gsap.set(meta, { opacity: 0, y: 12 });
        gsap.set(plan, { opacity: 1 }); // container visible — strokes hidden by dashoffset
        gsap.set(productsEl, { opacity: 1 }); // container visible, items hidden
        gsap.set(productItemEls, { opacity: 0, y: 10 });

        // Inject SVG and prepare stroke state
        var planData = injectPlanSVG(plan, projectId);

        var tl = gsap.timeline();

        // Expand body height
        tl.to(body, {
          height: 'auto',
          duration: 1.2,
          ease: 'power2.inOut',
        }, 0);

        // Meta info fades in (top)
        tl.to(meta, {
          opacity: 1,
          y: 0,
          duration: 0.6,
          ease: 'power2.out',
        }, 0.4);

        // Planimetry stroke-draw animation (starts at 0.6s into accordion)
        addPlanimetryToTimeline(tl, planData, 0.6);

        // Products appear one by one (bottom overlay)
        var productsDelay = CONFIG.t1.productsDelay || 2.5;
        var productsStagger = CONFIG.t1.productsStagger || 0.4;

        tl.to(productItemEls, {
          opacity: 1,
          y: 0,
          duration: 0.4,
          stagger: productsStagger,
          ease: 'power2.out',
        }, productsDelay);

        return tlPromise(tl);
      }

      function closeAccordion(item) {
        var body = item.body;
        var meta = item.meta;
        var plan = item.plan;
        var productItemEls = item.productItemEls;

        var tl = gsap.timeline();

        // Products fade out first
        tl.to(productItemEls, {
          opacity: 0,
          duration: 0.25,
          stagger: 0.05,
          ease: 'power2.in',
        }, 0);

        // Meta + plan fade out
        tl.to([meta, plan], {
          opacity: 0,
          duration: 0.35,
          ease: 'power2.in',
        }, 0.1);

        // Collapse body
        tl.to(body, {
          height: 0,
          duration: 0.9,
          ease: 'power2.inOut',
        }, 0.2);

        // Purge the plan SVG once the body has fully collapsed so only
        // the currently-open project ever holds a plan in the DOM —
        // prevents cross-project id collisions (see injectPlanSVG).
        tl.add(function () {
          gsap.killTweensOf(plan.querySelectorAll('*'));
          plan.innerHTML = '';
        });

        return tlPromise(tl);
      }

      // =============================================
      // 7. Dim / highlight title bars
      // =============================================

      var allNameEls = projectItems.map(function (p) { return p.nameEl; });
      var allLocEls = projectItems.map(function (p) {
        return p.bar.querySelector('.scroll-item__location');
      });

      function highlightProject(idx) {
        // Dim all titles
        gsap.to(allNameEls, { opacity: 0.35, duration: 0.6, ease: 'power2.out' });
        gsap.to(allLocEls, { opacity: 0.35, duration: 0.6, ease: 'power2.out' });
        // Highlight active
        gsap.to(allNameEls[idx], { opacity: 1, duration: 0.6, ease: 'power2.out' });
        gsap.to(allLocEls[idx], { opacity: 1, duration: 0.6, ease: 'power2.out' });
      }

      function resetHighlight() {
        gsap.to(allNameEls, { opacity: 1, duration: 0.8, ease: 'power2.out' });
        gsap.to(allLocEls, { opacity: 1, duration: 0.8, ease: 'power2.out' });
      }

      // =============================================
      // 8. Main animation loop
      // =============================================

      // --- Sync: wait for DX's project_end (with timeout fallback) ---
      var projectEndResolvers = Object.create(null);
      SYNC.on('project_end', function (msg) {
        var key = msg.index + ':' + msg.id;
        var resolve = projectEndResolvers[key];
        if (resolve) {
          delete projectEndResolvers[key];
          resolve();
        }
      });

      // --- Sync: heartbeat ---
      // SX's current state: { index, id } while inside a project window
      // (from project_start broadcast through project_end receipt), or
      // { index: null } otherwise. Rebroadcast every heartbeatMs so DX
      // can recover from any missed message / stale reconnect replay.
      var sxActive = { index: null, id: null };
      setInterval(function () {
        if (!SYNC.isAuthoritative()) return;
        SYNC.broadcastHeartbeat(sxActive.index, sxActive.id);
      }, CONFIG.sync.heartbeatMs || 4000);

      function waitForProjectEnd(index, id, fallbackSec) {
        return new Promise(function (resolve) {
          var key = index + ':' + id;
          var timeoutMs = Math.max(
            fallbackSec * 1000,
            CONFIG.sync.projectEndTimeoutMs || 120000
          );
          var timer = setTimeout(function () {
            if (projectEndResolvers[key]) {
              delete projectEndResolvers[key];
              console.warn('[SX] project_end timeout — advancing anyway', index, id);
              resolve();
            }
          }, timeoutMs);
          projectEndResolvers[key] = function () {
            clearTimeout(timer);
            resolve();
          };
        });
      }

      async function runLoop() {
        while (true) {
          // --- Cover ---
          gsap.set(scrollTrack, { y: 0 });
          resetHighlight();
          await delay(CONFIG.t0.duration);

          // --- Cycle through projects ---
          for (var i = 0; i < projectItems.length; i++) {
            var item = projectItems[i];
            var project = PROJECTS[i];
            var imgCount = (project.images.gallery && project.images.gallery.length) || CONFIG.t2.imageCount;

            // Infinite-loop sweep: scroll upward through all titles
            resetHighlight();
            await sweepLoop(item.el);
            highlightProject(i);

            // Kick DX the moment scroll settles — its zoom/gallery runs
            // in parallel with our accordion open, so both screens reach
            // their "content visible" state together.
            var syncLive = SYNC.isAuthoritative();
            sxActive = { index: i, id: project.id };
            if (syncLive) {
              SYNC.broadcastProjectStart(i, project.id);
            }

            // Brief pause — title visible
            await delay(0.4);

            // Open accordion (with SVG stroke animation)
            await openAccordion(item, project.id);

            // Hold: when sync is live, DX is the authoritative clock
            // and we wait for its project_end; standalone falls back to
            // the fixed per-project duration.
            var holdDuration = CONFIG.t1.duration + CONFIG.t2.durationPerImage * imgCount;
            if (syncLive) {
              await waitForProjectEnd(i, project.id, holdDuration);
            } else {
              await delay(holdDuration);
            }
            // No longer in the project window — heartbeat goes quiet.
            sxActive = { index: null, id: null };

            // Close accordion
            await closeAccordion(item);

            // Brief pause before next
            await delay(0.3);
          }

          // --- Sweep back to cover ---
          resetHighlight();
          await sweepLoop(coverItem);
        }
      }

      // =============================================
      // 9. Init
      // =============================================

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          // Fit each open accordion to exactly one screen regardless of
          // whether the title wraps: body height = screen - actual bar.
          // Without this, two-line titles push products off the bottom.
          projectItems.forEach(function (p) {
            var barH = p.bar.offsetHeight;
            p.inner.style.height = 'calc(var(--screen-h) - ' + barH + 'px)';
          });

          // Measure block height: first clone's offsetTop = total real block height
          blockHeight = firstCloneEl.offsetTop;
          console.log('[SX] Block height:', blockHeight, 'px');

          SYNC.connect('sx');

          preloadPlans().then(function () {
            runLoop();
            console.log('[SX] Accordion scroll started');
            console.log('[SX] Projects:', PROJECTS.length);
            console.log('[SX] Plans preloaded:', Object.keys(svgCache).length);
          });
        });
      });

      // Auto-refresh
      setTimeout(function () {
        window.location.reload();
      }, CONFIG.autoRefreshInterval);

    })();
  </script>

</body>
