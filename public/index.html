<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field Studies — Display Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a1a;
      color: #a09a90;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controller {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 64px;
      padding: 48px;
    }

    .header {
      text-align: center;
    }

    .header__title {
      font-weight: 900;
      font-size: 48px;
      line-height: 0.9;
      letter-spacing: -0.02em;
    }

    .header__subtitle {
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b6660;
      margin-top: 16px;
    }

    .screens {
      display: flex;
      gap: 32px;
    }

    .screen-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      padding: 40px 48px;
      border: 1px solid rgba(160, 154, 144, 0.15);
      transition: border-color 0.3s ease, background-color 0.3s ease;
    }

    .screen-link:hover {
      border-color: rgba(160, 154, 144, 0.4);
      background-color: rgba(160, 154, 144, 0.04);
    }

    .screen-link__icon {
      width: 120px;
      height: 213px;
      border: 1px solid rgba(160, 154, 144, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #6b6660;
    }

    .screen-link__label {
      font-weight: 500;
      font-size: 18px;
      color: #a09a90;
    }

    .screen-link__desc {
      font-weight: 400;
      font-size: 13px;
      color: #6b6660;
      text-align: center;
      max-width: 180px;
      line-height: 1.5;
    }

    .sync-note {
      font-size: 12px;
      color: #6b6660;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.6;
      max-width: 420px;
    }

    .sync-note code {
      color: #a09a90;
      background: rgba(160, 154, 144, 0.08);
      padding: 2px 6px;
    }

    .rotate-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: #a09a90;
      letter-spacing: 0.04em;
    }

    .rotate-toggle input {
      appearance: none;
      -webkit-appearance: none;
      width: 36px;
      height: 20px;
      border: 1px solid rgba(160, 154, 144, 0.4);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .rotate-toggle input::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #a09a90;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .rotate-toggle input:checked {
      background: rgba(176, 132, 106, 0.25);
      border-color: #b0846a;
    }

    .rotate-toggle input:checked::after {
      transform: translateX(16px);
      background: #b0846a;
    }

    .rotate-toggle__hint {
      font-size: 11px;
      color: #6b6660;
    }
  </style>
</head>
<body>

  <div class="controller">
    <div class="header">
      <div class="header__title">Field Studies</div>
      <div class="header__subtitle">Display Controller</div>
    </div>

    <div class="screens">
      <a href="./left/" class="screen-link" data-link="left">
        <div class="screen-link__icon">9 : 16</div>
        <div class="screen-link__label">SX — Left Screen</div>
        <div class="screen-link__desc">Accordion scroll, planimetry, products</div>
      </a>
      <a href="./right/" class="screen-link" data-link="right">
        <div class="screen-link__icon">9 : 16</div>
        <div class="screen-link__label">DX — Right Screen</div>
        <div class="screen-link__desc">Image grid, hero expansion, gallery</div>
      </a>
    </div>

    <label class="rotate-toggle">
      <input type="checkbox" id="rotate-cw">
      <span>TV a parete (ruotata 90° oraria)</span>
      <span class="rotate-toggle__hint">controruota il contenuto</span>
    </label>

    <div class="sync-note">
      Open both screens on two portrait monitors.<br>
      Sync via <code>?start=TIMESTAMP</code> URL parameter.<br>
      Loops continuously — no interaction needed.
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = 'fs.rotateCw';
      var toggle = document.getElementById('rotate-cw');
      var links = document.querySelectorAll('.screen-link');

      function applyLinks(on) {
        links.forEach(function (a) {
          var base = a.getAttribute('data-link') === 'left' ? './left/' : './right/';
          a.href = on ? base + '?rotate=cw' : base;
        });
      }

      var initial = localStorage.getItem(STORAGE_KEY) === '1';
      toggle.checked = initial;
      applyLinks(initial);

      toggle.addEventListener('change', function () {
        localStorage.setItem(STORAGE_KEY, toggle.checked ? '1' : '0');
        applyLinks(toggle.checked);
      });
    })();
  </script>

</body>
</html>
