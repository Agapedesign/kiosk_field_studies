<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>Field Studies — Right Screen</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    /* ========================================
       Screen Right — Layout
       ======================================== */

    body {
      background-color: var(--white);
    }

    .screen-right {
      width: var(--screen-w);
      height: var(--screen-h);
      position: relative;
      overflow: hidden;
      background-color: var(--white);
    }

    /* --- Grid fills the entire screen --- */

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      padding: 10px;
      gap: 10px;
    }

    /* --- Cells --- */

    .grid__cell {
      position: relative;
      overflow: hidden;
    }

    .grid__cell-inner {
      position: absolute;
      inset: 0;
      clip-path: inset(100% 0 0 0);
      transform: scale(1.08);
      will-change: clip-path, transform;
    }

    .grid__cell-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .grid__cell-placeholder {
      position: absolute;
      inset: 0;
    }

    /* Cell number — below image */
    .grid__cell-number {
      position: absolute;
      bottom: 0;
      left: 0;
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 9px;
      line-height: 1;
      color: #1a1a1a;
      transform: translateY(100%);
      padding-top: 3px;
    }

    /* --- Fullscreen image overlay (T₁) --- */

    .fullscreen-image {
      position: absolute;
      inset: 0;
      background-color: var(--white);
      opacity: 0;
      visibility: hidden;
      z-index: 10;
    }

    .fullscreen-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="screen-right" id="screenRight">

    <div class="grid" id="grid">
      <!-- All cells generated by JS -->
    </div>

    <div class="fullscreen-image" id="fullscreenImage">
      <img id="fullscreenImg" src="" alt="">
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/projects.js"></script>
  <script src="../shared/timeline.js"></script>
  <script>
    (function () {
      'use strict';

      var grid = document.getElementById('grid');
      var screenRight = document.getElementById('screenRight');

      // =============================================
      // 1. Palette
      // =============================================

      var PALETTE = [
        '#b8b0a4', '#a09890', '#8c8680', '#c4bcb0', '#9a9488',
        '#b0a898', '#7a7570', '#c8c0b4', '#8e8880', '#a8a098',
      ];

      function projectColor(pi, vi) {
        return PALETTE[(pi * 2 + vi) % PALETTE.length];
      }

      // =============================================
      // 2. Build cell data — one hero per project
      // =============================================

      var cells = [];

      PROJECTS.forEach(function (project, pi) {
        cells.push({ projectId: project.id, projectIndex: pi, globalIndex: pi });
      });

      // =============================================
      // 3. Calculate grid dimensions to fit screen
      // =============================================

      var SCREEN_W = 1080;
      var SCREEN_H = 1920;
      var GAP = 10;
      var PAD = 10;
      var NUM_HEIGHT = 14; // space reserved below each cell for the number
      var totalCells = cells.length;

      // Find optimal column count so all cells fit in the screen height
      var cols = 4;
      for (var tryCol = 4; tryCol <= 20; tryCol++) {
        var rows = Math.ceil(totalCells / tryCol);
        var availW = SCREEN_W - PAD * 2 - GAP * (tryCol - 1);
        var cellW = availW / tryCol;
        var cellH = cellW * (28 / 21); // 21:28 proportion
        var totalH = PAD * 2 + rows * (cellH + NUM_HEIGHT) + GAP * (rows - 1);
        if (totalH <= SCREEN_H) {
          cols = tryCol;
          break;
        }
      }

      var rows = Math.ceil(totalCells / cols);
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';

      console.log('[DX] Grid:', cols + '×' + rows, '=', cols * rows, 'slots for', totalCells, 'images');

      // =============================================
      // 4. Render cells
      // =============================================

      var allInners = [];

      cells.forEach(function (cell) {
        var el = document.createElement('div');
        el.className = 'grid__cell';
        el.dataset.project = cell.projectId;

        var inner = document.createElement('div');
        inner.className = 'grid__cell-inner';

        var project = PROJECTS[cell.projectIndex];
        var imgSrc = project.images.hero;

        // Placeholder
        var placeholder = document.createElement('div');
        placeholder.className = 'grid__cell-placeholder';
        placeholder.style.backgroundColor = projectColor(cell.projectIndex, 0);
        inner.appendChild(placeholder);

        // Image
        var img = document.createElement('img');
        img.className = 'grid__cell-image';
        img.src = imgSrc;
        img.alt = project.title;
        img.loading = 'lazy';
        img.style.opacity = '0';
        img.onload = function () {
          this.style.opacity = '1';
          placeholder.style.display = 'none';
        };
        img.onerror = function () {
          this.style.display = 'none';
        };
        inner.appendChild(img);

        el.appendChild(inner);

        // Number below image
        var num = document.createElement('span');
        num.className = 'grid__cell-number';
        num.textContent = String(cell.globalIndex + 1).padStart(3, '0');
        el.appendChild(num);

        grid.appendChild(el);
        allInners.push(inner);
      });

      // =============================================
      // 5. GSAP promise helpers
      // =============================================

      function animate(target, vars) {
        return new Promise(function (resolve) {
          vars.onComplete = resolve;
          gsap.to(target, vars);
        });
      }

      function delay(sec) {
        return new Promise(function (resolve) {
          setTimeout(resolve, sec * 1000);
        });
      }

      // =============================================
      // 6. Grid reveal / hide
      // =============================================

      var allCellEls = Array.from(grid.querySelectorAll('.grid__cell'));

      /** Reveal all cells with stagger */
      function revealAll() {
        allInners.forEach(function (inner, i) {
          gsap.to(inner, {
            clipPath: 'inset(0% 0 0 0)',
            scale: 1,
            duration: 0.6,
            ease: 'power2.out',
            delay: 0.008 * i,
            overwrite: true,
          });
        });
      }

      /** Hide non-project cells. Returns a promise when done. */
      function hideNonProject(activeProjectId) {
        var dur = 0.6;
        allCellEls.forEach(function (cell) {
          if (cell.dataset.project !== activeProjectId) {
            gsap.to(cell.querySelector('.grid__cell-inner'), {
              clipPath: 'inset(0 0 100% 0)',
              scale: 1.08,
              duration: dur,
              ease: 'power2.in',
              overwrite: true,
            });
          }
        });
        return delay(dur + 0.1);
      }

      /** Reveal all hidden cells back */
      function revealNonProject() {
        allCellEls.forEach(function (cell) {
          var inner = cell.querySelector('.grid__cell-inner');
          gsap.to(inner, {
            clipPath: 'inset(0% 0 0 0)',
            scale: 1,
            duration: 0.8,
            ease: 'power2.out',
            overwrite: true,
          });
        });
      }

      // Initial reveal
      revealAll();

      // =============================================
      // 7. Fullscreen expand / contract (promise-based)
      // =============================================

      var fullscreenEl = document.getElementById('fullscreenImage');
      var fullscreenImg = document.getElementById('fullscreenImg');

      function cellClipPath(cell) {
        var sr = screenRight.getBoundingClientRect();
        var cr = cell.getBoundingClientRect();
        var top    = (cr.top - sr.top) / sr.height * 100;
        var right  = 100 - (cr.right - sr.left) / sr.width * 100;
        var bottom = 100 - (cr.bottom - sr.top) / sr.height * 100;
        var left   = (cr.left - sr.left) / sr.width * 100;
        return 'inset(' + top + '% ' + right + '% ' + bottom + '% ' + left + '%)';
      }

      function expandFromCell(cellEl, imgSrc, pi) {
        var clip = cellClipPath(cellEl);
        fullscreenImg.src = imgSrc;
        fullscreenEl.style.backgroundColor = projectColor(pi, 0);
        gsap.set(fullscreenEl, { visibility: 'visible', opacity: 1, clipPath: clip });
        return animate(fullscreenEl, {
          clipPath: 'inset(0% 0% 0% 0%)',
          duration: CONFIG.imageExpand.duration,
          ease: CONFIG.ease.imageExpand,
        });
      }

      function contractToCell(cellEl) {
        var clip = cellClipPath(cellEl);
        return animate(fullscreenEl, {
          clipPath: clip,
          duration: CONFIG.imageExpand.duration * 0.7,
          ease: CONFIG.ease.imageExpand,
        }).then(function () {
          gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
        });
      }

      // =============================================
      // 8. Project cycle — iterate through images
      // =============================================

      var currentActiveId = null;
      var cycleAborted = false;

      /** Curtain down — reveal new image from top */
      function curtainDown(imgSrc, pi) {
        fullscreenImg.src = imgSrc;
        fullscreenEl.style.backgroundColor = projectColor(pi, 0);
        gsap.set(fullscreenEl, { visibility: 'visible', opacity: 1, clipPath: 'inset(0 0 100% 0)' });
        return animate(fullscreenEl, {
          clipPath: 'inset(0% 0% 0% 0%)',
          duration: 1.0,
          ease: 'power2.inOut',
        });
      }

      /** Curtain up — hide current image upward */
      function curtainUp() {
        return animate(fullscreenEl, {
          clipPath: 'inset(100% 0 0 0)',
          duration: 1.0,
          ease: 'power2.inOut',
        }).then(function () {
          gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
        });
      }

      async function cycleProject(projectId, projectIndex) {
        var project = PROJECTS[projectIndex];
        var cellEl = allCellEls.find(function (c) {
          return c.dataset.project === projectId;
        });
        if (!cellEl) return;

        // All images: hero + gallery
        var images = [project.images.hero];
        project.images.gallery.forEach(function (g) { images.push(g); });

        for (var i = 0; i < images.length; i++) {
          if (cycleAborted) return;

          var imgSrc = '../' + images[i];

          if (i === 0) {
            // First image: expand from cell
            await expandFromCell(cellEl, imgSrc, projectIndex);
          } else {
            // Subsequent images: curtain down
            await curtainDown(imgSrc, projectIndex);
          }
          if (cycleAborted) return;

          // Hold
          await delay(CONFIG.t2.durationPerImage);
          if (cycleAborted) return;

          if (i === images.length - 1) {
            // Last image: contract back to cell
            await contractToCell(cellEl);
          } else {
            // Between images: curtain up, brief pause
            await curtainUp();
            if (cycleAborted) return;
            await delay(0.3);
          }
        }
      }

      // =============================================
      // 9. State machine — poll TIMELINE, trigger cycle
      // =============================================

      function updateGridState() {
        var state = TIMELINE.getState();
        var isActive = state.phase !== 't0' && state.phase !== 'dissolve';
        var activeId = isActive ? PROJECTS[state.projectIndex].id : null;

        if (activeId !== currentActiveId) {
          // Abort running cycle
          cycleAborted = true;

          if (currentActiveId && !activeId) {
            // Back to T₀ — hide fullscreen, reveal all cells
            gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
            revealNonProject();
          }

          currentActiveId = activeId;

          if (activeId) {
            var pi = state.projectIndex;
            cycleAborted = false;

            // 1) Hide non-project cells → 2) cycle through project images
            hideNonProject(activeId).then(function () {
              if (!cycleAborted) {
                cycleProject(activeId, pi);
              }
            });
          }
        }

        requestAnimationFrame(updateGridState);
      }

      requestAnimationFrame(updateGridState);

      // =============================================
      // 10. Auto-refresh
      // =============================================

      setTimeout(function () {
        window.location.reload();
      }, CONFIG.autoRefreshInterval);

      console.log('[DX] Field Studies — Right screen loaded');
      console.log('[DX] Total cells:', totalCells);

    })();
  </script>

</body>
</html>
