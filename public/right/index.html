<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>Field Studies — Right Screen</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    /* ========================================
       Screen Right — Layout
       ======================================== */

    body {
      background-color: var(--black);
    }

    .screen-right {
      width: var(--screen-w);
      height: var(--screen-h);
      position: relative;
      overflow: hidden;
      background-color: var(--black);
    }

    /* --- Grid fills the entire screen --- */

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      padding: 14px;
      gap: 14px;
    }

    /* --- Cells --- */

    .grid__cell {
      position: relative;
      overflow: hidden;
    }

    .grid__cell-inner {
      position: absolute;
      inset: 0 0 16px 0;
      clip-path: inset(0 0 100% 0);
      transform: scale(1.08);
      will-change: clip-path, transform;
    }

    .grid__cell-image {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: top left;
    }

    /* Project code — in reserved area below image */
    .grid__cell-code {
      position: absolute;
      bottom: 0;
      right: 0;
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 7px;
      line-height: 16px;
      color: var(--white);
      white-space: nowrap;
    }

    /* --- Floating composition layer (T0 → T5) --- */

    .fs-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .fs-layer img {
      position: absolute;
      display: block;
      will-change: left, top, width, height, clip-path, opacity;
    }
  </style>
</head>
<body>

  <div class="screen-right" id="screenRight">

    <div class="grid" id="grid">
      <!-- All cells generated by JS -->
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/projects.js"></script>
  <script src="../shared/timeline.js"></script>
  <script>
    (function () {
      'use strict';

      var grid = document.getElementById('grid');
      var screenRight = document.getElementById('screenRight');

      // =============================================
      // 1. Cloudinary helper + Palette
      // =============================================

      /**
       * Insert Cloudinary transformations into a URL.
       * For non-Cloudinary URLs (local paths), returns as-is.
       * @param {string} url — base Cloudinary URL or local path
       * @param {number} w — target width
       * @param {number} [h] — optional target height
       */
      function cldImg(url, w, h) {
        if (!url || url.indexOf('res.cloudinary.com') === -1) return url;
        var transform = h
          ? 'w_' + w + ',h_' + h + ',c_fill,q_auto,f_auto'
          : 'w_' + w + ',c_limit,q_auto,f_auto';
        return url.replace('/upload/', '/upload/' + transform + '/');
      }

      // Thumbnail width — matches actual cell size (~140px)
      var THUMB_W = 150;
      // Fullscreen width
      var FULL_W = 1080;
      var FULL_H = 1920;

      var FALLBACK_BG = 'rgba(0,0,0,0.05)';

      // =============================================
      // 2. Build cell data — one hero per project
      // =============================================

      var cells = [];

      PROJECTS.forEach(function (project, pi) {
        cells.push({ projectId: project.id, projectIndex: pi, globalIndex: pi });
      });

      // =============================================
      // 3. Calculate grid dimensions to fit screen
      // =============================================

      var SCREEN_W = 1080;
      var SCREEN_H = 1920;
      var GAP = 14;
      var PAD = 14;
      var CODE_HEIGHT = 16; // space reserved below image for project code
      var totalCells = cells.length;

      // Find optimal column count so all cells fit in the screen height
      var cols = 4;
      for (var tryCol = 4; tryCol <= 20; tryCol++) {
        var rows = Math.ceil(totalCells / tryCol);
        var availW = SCREEN_W - PAD * 2 - GAP * (tryCol - 1);
        var cellW = availW / tryCol;
        var cellH = cellW * (28 / 21) + CODE_HEIGHT; // 21:28 image + code area
        var totalH = PAD * 2 + rows * cellH + GAP * (rows - 1);
        if (totalH <= SCREEN_H) {
          cols = tryCol;
          break;
        }
      }

      var rows = Math.ceil(totalCells / cols);
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';

      console.log('[DX] Grid:', cols + '×' + rows, '=', cols * rows, 'slots for', totalCells, 'images');

      // =============================================
      // 4. Render cells
      // =============================================

      var allInners = [];

      cells.forEach(function (cell) {
        var el = document.createElement('div');
        el.className = 'grid__cell';
        el.dataset.project = cell.projectId;

        var inner = document.createElement('div');
        inner.className = 'grid__cell-inner';

        var project = PROJECTS[cell.projectIndex];
        var imgSrc = cldImg(project.images.hero, THUMB_W);

        // Image
        var img = document.createElement('img');
        img.className = 'grid__cell-image';
        img.src = imgSrc;
        img.alt = project.title;
        img.onerror = function () {
          // Missing image — show neutral fallback
          this.style.display = 'none';
          inner.style.backgroundColor = FALLBACK_BG;
        };
        inner.appendChild(img);

        el.appendChild(inner);

        // Project code — bottom-right inside cell
        var code = document.createElement('span');
        code.className = 'grid__cell-code';
        code.textContent = project.code;
        el.appendChild(code);

        grid.appendChild(el);
        allInners.push(inner);
      });

      // =============================================
      // 5. GSAP promise helpers
      // =============================================

      function animate(target, vars) {
        return new Promise(function (resolve) {
          vars.onComplete = resolve;
          gsap.to(target, vars);
        });
      }

      function delay(sec) {
        return new Promise(function (resolve) {
          setTimeout(resolve, sec * 1000);
        });
      }

      // =============================================
      // 6. Grid reveal / hide
      // =============================================

      var allCellEls = Array.from(grid.querySelectorAll('.grid__cell'));

      /** Reveal all cells with wave stagger */
      function revealAll() {
        allInners.forEach(function (inner, i) {
          gsap.to(inner, {
            clipPath: 'inset(0% 0 0 0)',
            scale: 1,
            duration: 0.6,
            ease: 'power2.out',
            delay: 0.03 * i,
            overwrite: true,
          });
        });
      }

      /** T-1: Hide non-project cells (curtain up, bottom → top) with wave stagger. */
      function hideNonProject(activeProjectId) {
        var dur = 0.5;
        var stagger = 0.025;
        var idx = 0;
        allCellEls.forEach(function (cell) {
          if (cell.dataset.project !== activeProjectId) {
            gsap.fromTo(
              cell.querySelector('.grid__cell-inner'),
              { clipPath: 'inset(0% 0% 0% 0%)', scale: 1 },
              {
                clipPath: 'inset(0% 0% 100% 0%)',
                scale: 1.08,
                duration: dur,
                delay: idx * stagger,
                ease: 'power2.in',
                overwrite: true,
                immediateRender: false,
              }
            );
            idx++;
          }
        });
        return delay(dur + idx * stagger + 0.05);
      }

      /** T6: Reveal all non-project cells — curtain down (top → bottom), wave stagger. */
      function revealNonProject(activeProjectId) {
        var staggerIdx = 0;
        allCellEls.forEach(function (cell) {
          if (activeProjectId && cell.dataset.project === activeProjectId) return;
          var inner = cell.querySelector('.grid__cell-inner');
          gsap.fromTo(
            inner,
            { clipPath: 'inset(0% 0% 100% 0%)', scale: 1.08 },
            {
              clipPath: 'inset(0% 0% 0% 0%)',
              scale: 1,
              duration: 1.0,
              ease: 'power3.out',
              delay: 0.04 * staggerIdx,
              overwrite: true,
              immediateRender: false,
            }
          );
          staggerIdx++;
        });
        return 1.0 + 0.04 * staggerIdx;
      }

      // Initial reveal
      revealAll();

      // =============================================
      // 7. Composition helpers
      // =============================================

      /** Preload image and return natural dimensions. */
      function preloadImageWithSize(url) {
        return new Promise(function (resolve) {
          var tmp = new Image();
          tmp.onload = function () {
            resolve({ url: url, w: tmp.naturalWidth || 1080, h: tmp.naturalHeight || 1440 });
          };
          tmp.onerror = function () {
            resolve({ url: url, w: 1080, h: 1440 });
          };
          tmp.src = url;
        });
      }

      /**
       * Composition slots within 1080×1920 — non-overlapping free layout.
       * Each slot = { cx, cy, maxW, maxH }. Images fit inside max bounds
       * preserving natural aspect; boxes are designed with clear gutters
       * so fitted images never overlap regardless of aspect ratio.
       *
       * Bands: top (hero + 2 accents), mid, bottom.
       */
      function getCompositionSlots(n) {
        var all = [
          { cx: 540, cy: 470,  maxW: 640, maxH: 800 }, // 0 hero (x 220–860, y 70–870)
          { cx: 275, cy: 1150, maxW: 490, maxH: 440 }, // 1 left mid  (x 30–520,  y 930–1370)
          { cx: 805, cy: 1150, maxW: 490, maxH: 440 }, // 2 right mid (x 560–1050,y 930–1370)
          { cx: 215, cy: 1620, maxW: 350, maxH: 400 }, // 3 bottom-left   (x 40–390,  y 1420–1820)
          { cx: 865, cy: 1620, maxW: 350, maxH: 400 }, // 4 bottom-right  (x 690–1040,y 1420–1820)
          { cx: 540, cy: 1620, maxW: 270, maxH: 400 }, // 5 bottom-center (x 405–675, y 1420–1820)
          { cx: 100, cy: 320,  maxW: 170, maxH: 280 }, // 6 upper-left accent  (x 15–185, y 180–460)
          { cx: 980, cy: 320,  maxW: 170, maxH: 280 }, // 7 upper-right accent (x 895–1065,y 180–460)
        ];
        return all.slice(0, Math.min(n, all.length));
      }

      /** Fit natural aspect ratio inside a slot's max bounding box. */
      function computeImageBox(slot, natW, natH) {
        var ar = natW / natH;
        var maxAr = slot.maxW / slot.maxH;
        var w, h;
        if (ar >= maxAr) {
          w = slot.maxW;
          h = w / ar;
        } else {
          h = slot.maxH;
          w = h * ar;
        }
        return { x: slot.cx - w / 2, y: slot.cy - h / 2, w: w, h: h };
      }

      // =============================================
      // 8. Project cycle — T-1 → T6
      // =============================================

      var currentActiveId = null;
      var cycleIdCounter = 0;
      var activeCycleId = 0;
      var cycleCompleted = false;
      var activeLayer = null;
      var activeHeroInner = null;

      function cleanupCycle() {
        if (activeLayer && activeLayer.parentNode) {
          activeLayer.parentNode.removeChild(activeLayer);
        }
        if (activeHeroInner) {
          gsap.set(activeHeroInner, { opacity: 1 });
        }
        activeLayer = null;
        activeHeroInner = null;
      }

      async function cycleProject(projectId, projectIndex) {
        var myId = ++cycleIdCounter;
        activeCycleId = myId;
        cycleCompleted = false;
        function live() { return activeCycleId === myId; }

        var project = PROJECTS[projectIndex];
        var cellEl = allCellEls.find(function (c) { return c.dataset.project === projectId; });
        if (!cellEl) return;

        var innerEl = cellEl.querySelector('.grid__cell-inner');
        var heroImgEl = innerEl.querySelector('.grid__cell-image');

        // Collect image URLs (hero + gallery), cap at available slots
        var allUrls = [project.images.hero].concat(project.images.gallery || []);
        var maxSlots = getCompositionSlots(99).length;
        var imgUrls = allUrls.slice(0, maxSlots);

        // T-1
        await hideNonProject(projectId);
        if (!live()) return;

        // Preload with natural dimensions
        var imgData = await Promise.all(imgUrls.map(function (url) {
          return preloadImageWithSize(cldImg(url, FULL_W));
        }));
        if (!live()) return;

        // Measure hero cell image rect (actual rendered rect, not cell box)
        var sr = screenRight.getBoundingClientRect();
        var imgCr = heroImgEl.getBoundingClientRect();
        var heroRect = {
          x: imgCr.left - sr.left,
          y: imgCr.top - sr.top,
          w: imgCr.width,
          h: imgCr.height,
        };

        // Create floating layer
        var layer = document.createElement('div');
        layer.className = 'fs-layer';
        screenRight.appendChild(layer);
        activeLayer = layer;
        activeHeroInner = innerEl;

        // Create floaters — all start at hero rect; hero on top, others beneath
        var floaters = imgData.map(function (data, i) {
          var el = document.createElement('img');
          el.src = data.url;
          el.style.zIndex = (i === 0) ? 2 : 1;
          layer.appendChild(el);
          gsap.set(el, {
            left: heroRect.x,
            top: heroRect.y,
            width: heroRect.w,
            height: heroRect.h,
            opacity: 1,
            clipPath: 'inset(0 0 0 0)',
          });
          return { el: el, data: data };
        });

        // T0: swap grid thumb → floating hero (same position, same size)
        gsap.set(innerEl, { opacity: 0 });
        await delay(0.25);
        if (!live()) return;

        // T1 + T2: non-hero slide out from under hero; hero scales up last
        var slots = getCompositionSlots(floaters.length);
        var nonHeroTweens = floaters.slice(1).map(function (f, i) {
          var slot = slots[i + 1];
          var box = computeImageBox(slot, f.data.w, f.data.h);
          return animate(f.el, {
            left: box.x,
            top: box.y,
            width: box.w,
            height: box.h,
            duration: 1.3,
            delay: i * 0.14,
            ease: 'power3.out',
          });
        });
        var heroBox = computeImageBox(slots[0], floaters[0].data.w, floaters[0].data.h);
        var heroTween = animate(floaters[0].el, {
          left: heroBox.x,
          top: heroBox.y,
          width: heroBox.w,
          height: heroBox.h,
          duration: 1.4,
          delay: 0.25,
          ease: 'power3.inOut',
        });
        await Promise.all(nonHeroTweens.concat([heroTween]));
        if (!live()) return;

        // T3: hold
        await delay(3.8);
        if (!live()) return;

        // T4: side-curtain hides non-hero images (left edge sweeps right)
        var hideTweens = floaters.slice(1).map(function (f, i) {
          return animate(f.el, {
            clipPath: 'inset(0 0 0 100%)',
            duration: 0.7,
            delay: i * 0.08,
            ease: 'power2.in',
          });
        });
        await Promise.all(hideTweens);
        if (!live()) return;

        // T5: hero scales back to grid cell rect
        await animate(floaters[0].el, {
          left: heroRect.x,
          top: heroRect.y,
          width: heroRect.w,
          height: heroRect.h,
          duration: 0.9,
          ease: 'power3.inOut',
        });
        if (!live()) return;

        // Restore grid thumb, remove floating layer
        gsap.set(innerEl, { opacity: 1 });
        if (layer.parentNode) layer.parentNode.removeChild(layer);
        activeLayer = null;
        activeHeroInner = null;

        // Brief beat so T5 → T6 reads as two distinct steps
        await delay(0.4);
        if (!live()) return;

        // T6: reveal other cells — curtain down with wave stagger
        revealNonProject(projectId);
        cycleCompleted = true;
      }

      // =============================================
      // 9. State machine — poll TIMELINE, trigger cycle
      // =============================================

      function updateGridState() {
        var state = TIMELINE.getState();
        var isActive = state.phase !== 't0' && state.phase !== 'dissolve';
        var activeId = isActive ? PROJECTS[state.projectIndex].id : null;

        if (activeId !== currentActiveId) {
          var prevId = currentActiveId;
          var wasCompleted = cycleCompleted;

          // Invalidate any running cycle — its `live()` checks will now fail.
          activeCycleId++;
          cleanupCycle();

          // Only force-reveal if cycleProject didn't already run T6 naturally.
          // Avoids jarring double animation at end of each project.
          if (prevId && !wasCompleted) {
            revealNonProject(prevId);
          }
          cycleCompleted = false;

          currentActiveId = activeId;

          if (activeId) {
            cycleProject(activeId, state.projectIndex);
          }
        }

        requestAnimationFrame(updateGridState);
      }

      requestAnimationFrame(updateGridState);

      // =============================================
      // 10. Auto-refresh
      // =============================================

      setTimeout(function () {
        window.location.reload();
      }, CONFIG.autoRefreshInterval);

      console.log('[DX] Field Studies — Right screen loaded');
      console.log('[DX] Total cells:', totalCells);

    })();
  </script>

</body>
</html>
