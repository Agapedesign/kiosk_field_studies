<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>Field Studies — Right Screen</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    /* ========================================
       Screen Right — Layout
       ======================================== */

    body {
      background-color: var(--white);
    }

    .screen-right {
      width: var(--screen-w);
      height: var(--screen-h);
      position: relative;
      overflow: hidden;
      background-color: var(--white);
    }

    /* --- Grid wrapper (clips the scrolling content) --- */

    .grid-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* --- Grid track (scrolls vertically, contains two copies for seamless loop) --- */

    .grid-track {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    /* --- Single grid block (one full set of cells) --- */

    .grid-block {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 0 3px;
      width: 100%;
    }

    .grid-block:first-child {
      padding-top: 3px;
    }

    /* --- Cells --- */

    .grid__cell {
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .grid__cell::before {
      content: '';
      display: block;
      padding-top: 100%;
    }

    .grid__cell-inner {
      position: absolute;
      inset: 0;
    }

    /* Cell size variants */
    .grid__cell--2x1 {
      grid-column: span 2;
    }

    .grid__cell--1x2 {
      grid-row: span 2;
    }

    .grid__cell--1x2::before {
      padding-top: calc(200% + 3px);
    }

    .grid__cell--2x2 {
      grid-column: span 2;
      grid-row: span 2;
    }

    .grid__cell--2x2::before {
      padding-top: calc(100% + 3px);
    }

    /* Empty cell — transparent, just the number */
    .grid__cell--empty {
      background-color: transparent;
    }

    .grid__cell--empty .grid__cell-inner {
      background-color: transparent;
    }

    /* Cell number watermark */
    .grid__cell-number {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: var(--font-family);
      font-weight: 300;
      font-size: 13px;
      color: var(--text-tertiary);
      opacity: 0.6;
      z-index: 2;
    }

    /* Image cells */
    .grid__cell-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Placeholder for development — muted tones */
    .grid__cell-placeholder {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* Project label inside placeholder */
    .grid__cell-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.5);
      z-index: 2;
    }

    /* --- Fullscreen image overlay (T₁) --- */

    .fullscreen-image {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--white);
      opacity: 0;
      visibility: hidden;
      z-index: 10;
    }

    .fullscreen-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* --- Horizontal gallery (T₂, future milestone) --- */

    .gallery {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: stretch;
      background-color: var(--white);
      opacity: 0;
      visibility: hidden;
      z-index: 10;
    }

    .gallery__slide {
      min-width: 100%;
      height: 100%;
    }

    .gallery__slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="screen-right" id="screenRight">

    <!-- ============ Grid viewport (clips scroll) ============ -->
    <div class="grid-viewport" id="gridViewport">
      <div class="grid-track" id="gridTrack">
        <!-- Two grid blocks generated by JS for seamless loop -->
      </div>
    </div>

    <!-- ============ Fullscreen hero image (T₁) ============ -->
    <div class="fullscreen-image" id="fullscreenImage">
      <img id="fullscreenImg" src="" alt="">
    </div>

    <!-- ============ Horizontal gallery (T₂, future) ============ -->
    <div class="gallery" id="gallery">
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/projects.js"></script>
  <script src="../shared/timeline.js"></script>
  <script>
    /**
     * Screen Right — Controller
     * Milestones 2–4: VVisual grid with scroll, project-aware opacity, image expansion
     */

    (function () {
      'use strict';

      const gridTrack = document.getElementById('gridTrack');

      // =============================================
      // 1. Grid data — cell layout definition
      // =============================================

      // Muted placeholder palette (architectural tones)
      const PALETTE = [
        '#b8b0a4', // warm stone
        '#a09890', // clay
        '#8c8680', // concrete
        '#c4bcb0', // limestone
        '#9a9488', // driftwood
        '#b0a898', // sandstone
        '#7a7570', // slate
        '#c8c0b4', // travertine
        '#8e8880', // graphite warm
        '#a8a098', // ash
      ];

      // Each project gets a tonal range from the palette
      function projectColor(projectIndex, variation) {
        const base = projectIndex * 2;
        return PALETTE[(base + variation) % PALETTE.length];
      }

      // Grid cell definitions
      // Each cell: { size, projectId?, imageIndex?, empty? }
      // The grid should feel organic — varied sizes, some empty cells as breathing room
      function buildCellMap() {
        const cells = [];
        let globalIndex = 0;

        PROJECTS.forEach((project, pi) => {
          const imgCount = project.images.gallery.length + 1; // +1 for hero

          // Each project contributes a cluster of cells
          // Row 1: hero (2×1) + empty + 1×1
          cells.push({ size: '2x1', projectId: project.id, projectIndex: pi, imageIndex: 0, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', empty: true, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', projectId: project.id, projectIndex: pi, imageIndex: 1, globalIndex: globalIndex++ });

          // Row 2: 1×1 + 1×1 + 1×2 (the 1×2 spans into next row)
          cells.push({ size: '1x1', projectId: project.id, projectIndex: pi, imageIndex: 2, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', projectId: project.id, projectIndex: pi, imageIndex: 3 % imgCount, globalIndex: globalIndex++ });
          cells.push({ size: '1x2', projectId: project.id, projectIndex: pi, imageIndex: 4 % imgCount, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', empty: true, globalIndex: globalIndex++ });

          // Row 3 (partial — 1×2 from above occupies one slot): 1×1 + 1×1 + empty
          cells.push({ size: '1x1', projectId: project.id, projectIndex: pi, imageIndex: 5 % imgCount, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', empty: true, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', projectId: project.id, projectIndex: pi, imageIndex: 6 % imgCount, globalIndex: globalIndex++ });

          // Breathing row between projects: empty + 2×1 + empty
          cells.push({ size: '1x1', empty: true, globalIndex: globalIndex++ });
          cells.push({ size: '2x1', projectId: project.id, projectIndex: pi, imageIndex: 7 % imgCount, globalIndex: globalIndex++ });
          cells.push({ size: '1x1', empty: true, globalIndex: globalIndex++ });
        });

        return cells;
      }

      // =============================================
      // 2. Render grid block
      // =============================================

      function createGridBlock(cells) {
        const block = document.createElement('div');
        block.className = 'grid-block';

        cells.forEach((cell) => {
          const el = document.createElement('div');
          el.className = 'grid__cell';

          // Size class
          if (cell.size === '2x1') el.classList.add('grid__cell--2x1');
          if (cell.size === '1x2') el.classList.add('grid__cell--1x2');
          if (cell.size === '2x2') el.classList.add('grid__cell--2x2');

          if (cell.empty) {
            el.classList.add('grid__cell--empty');
            // Number watermark on empty cells
            const inner = document.createElement('div');
            inner.className = 'grid__cell-inner';
            const num = document.createElement('span');
            num.className = 'grid__cell-number';
            num.textContent = String(cell.globalIndex + 1).padStart(3, '0');
            inner.appendChild(num);
            el.appendChild(inner);
          } else {
            // Image cell
            const inner = document.createElement('div');
            inner.className = 'grid__cell-inner';

            // Data attributes for future milestone (opacity targeting by project)
            el.dataset.project = cell.projectId;

            // Try to load real image, fall back to placeholder
            const project = PROJECTS[cell.projectIndex];
            const imgSrc = cell.imageIndex === 0
              ? project.images.hero
              : (project.images.gallery[cell.imageIndex - 1] || project.images.hero);

            // Placeholder color block (shown while no real images)
            const placeholder = document.createElement('div');
            placeholder.className = 'grid__cell-placeholder';
            placeholder.style.backgroundColor = projectColor(cell.projectIndex, cell.imageIndex);
            inner.appendChild(placeholder);

            // Real image (hidden until loaded)
            const img = document.createElement('img');
            img.className = 'grid__cell-image';
            img.src = imgSrc;
            img.alt = project.title;
            img.loading = 'lazy';
            img.style.opacity = '0';
            img.onload = function () {
              this.style.opacity = '1';
              // Hide placeholder when image loads
              placeholder.style.display = 'none';
            };
            img.onerror = function () {
              // Keep placeholder visible, hide broken image
              this.style.display = 'none';
            };
            inner.appendChild(img);

            // Project label (dev helper, visible on placeholders)
            const label = document.createElement('span');
            label.className = 'grid__cell-label';
            label.textContent = project.title.toLowerCase();
            inner.appendChild(label);

            // Cell number
            const num = document.createElement('span');
            num.className = 'grid__cell-number';
            num.textContent = String(cell.globalIndex + 1).padStart(3, '0');
            inner.appendChild(num);

            el.appendChild(inner);
          }

          block.appendChild(el);
        });

        return block;
      }

      // =============================================
      // 3. Build the grid — two copies for seamless loop
      // =============================================

      const cells = buildCellMap();

      const blockA = createGridBlock(cells);
      const blockB = createGridBlock(cells);
      gridTrack.appendChild(blockA);
      gridTrack.appendChild(blockB);

      // =============================================
      // 4. Infinite vertical scroll with GSAP
      // =============================================

      var scrollTween = null;

      // Wait for layout to settle, then measure and animate
      requestAnimationFrame(() => {
        const blockHeight = blockA.offsetHeight + CONFIG.grid.cellGap;

        // Scroll duration based on speed: distance / speed
        const scrollDuration = blockHeight / CONFIG.grid.scrollSpeed;

        // GSAP infinite scroll — translate Y from 0 to -blockHeight, then snap back
        scrollTween = gsap.to(gridTrack, {
          y: -blockHeight,
          duration: scrollDuration,
          ease: 'none',
          repeat: -1,
          modifiers: {
            y: gsap.utils.unitize(function (y) {
              return parseFloat(y) % blockHeight;
            }),
          },
        });

        console.log('[DX] Grid block height:', blockHeight, 'px');
        console.log('[DX] Scroll cycle:', scrollDuration.toFixed(1), 'sec');
      });

      // =============================================
      // 5. Fullscreen image expansion (T₁)
      // =============================================

      var screenRight = document.getElementById('screenRight');
      var fullscreenEl = document.getElementById('fullscreenImage');
      var fullscreenImg = document.getElementById('fullscreenImg');
      var isExpanded = false;
      var expandedProjectId = null;
      var expandTween = null;

      /**
       * Find the most visible cell for a given project inside the viewport.
       * Returns the cell DOM element, or null.
       */
      function findVisibleProjectCell(projectId) {
        var matchCells = gridTrack.querySelectorAll('.grid__cell[data-project="' + projectId + '"]');
        var vpRect = document.getElementById('gridViewport').getBoundingClientRect();

        var bestCell = null;
        var bestOverlap = 0;

        for (var i = 0; i < matchCells.length; i++) {
          var rect = matchCells[i].getBoundingClientRect();
          var overlapTop = Math.max(rect.top, vpRect.top);
          var overlapBottom = Math.min(rect.bottom, vpRect.bottom);
          var overlap = Math.max(0, overlapBottom - overlapTop);

          if (overlap > bestOverlap) {
            bestOverlap = overlap;
            bestCell = matchCells[i];
          }
        }

        return bestCell;
      }

      /**
       * Build an inset() clip string from a cell rect relative to screenRight.
       */
      function cellClipPath(cell) {
        var sr = screenRight.getBoundingClientRect();
        var cr = cell.getBoundingClientRect();
        var top    = (cr.top - sr.top) / sr.height * 100;
        var right  = 100 - (cr.right - sr.left) / sr.width * 100;
        var bottom = 100 - (cr.bottom - sr.top) / sr.height * 100;
        var left   = (cr.left - sr.left) / sr.width * 100;
        return 'inset(' + top + '% ' + right + '% ' + bottom + '% ' + left + '%)';
      }

      /**
       * Expand the hero image to fullscreen from the cell's position.
       */
      function expandToFullscreen(projectId) {
        if (isExpanded) return;

        var cell = findVisibleProjectCell(projectId);
        if (!cell) return;

        // Pause grid scroll
        if (scrollTween) scrollTween.pause();

        // Set hero image source + fallback background
        var project = PROJECTS.find(function (p) { return p.id === projectId; });
        if (!project) return;
        fullscreenImg.src = '../' + project.images.hero;
        var pi = PROJECTS.indexOf(project);
        fullscreenEl.style.backgroundColor = projectColor(pi, 0);

        // Start clipped to the cell, then expand to full screen
        var clip = cellClipPath(cell);
        gsap.set(fullscreenEl, {
          visibility: 'visible',
          opacity: 1,
          clipPath: clip,
        });

        if (expandTween) expandTween.kill();
        expandTween = gsap.to(fullscreenEl, {
          clipPath: 'inset(0% 0% 0% 0%)',
          duration: CONFIG.imageExpand.duration,
          ease: CONFIG.ease.imageExpand,
        });

        isExpanded = true;
        expandedProjectId = projectId;
        console.log('[DX] Expand:', projectId);
      }

      /**
       * Contract the fullscreen image back to the cell's position.
       */
      function contractFromFullscreen() {
        if (!isExpanded) return;

        var cell = findVisibleProjectCell(expandedProjectId);

        if (expandTween) expandTween.kill();

        if (cell) {
          var clip = cellClipPath(cell);
          expandTween = gsap.to(fullscreenEl, {
            clipPath: clip,
            duration: CONFIG.imageExpand.duration * 0.7,
            ease: CONFIG.ease.imageExpand,
            onComplete: function () {
              gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
              if (scrollTween) scrollTween.resume();
            },
          });
        } else {
          // Cell not visible — just fade out
          expandTween = gsap.to(fullscreenEl, {
            opacity: 0,
            duration: 0.5,
            onComplete: function () {
              gsap.set(fullscreenEl, { visibility: 'hidden', clipPath: '' });
              if (scrollTween) scrollTween.resume();
            },
          });
        }

        console.log('[DX] Contract:', expandedProjectId);
        isExpanded = false;
        expandedProjectId = null;
      }

      // =============================================
      // 6. Project-aware opacity (synced with SX timeline)
      // =============================================

      var currentActiveId = null;
      var projectCells = document.querySelectorAll('.grid__cell[data-project]');

      function updateGridOpacity() {
        var state = TIMELINE.getState();
        // Project is "active" during transition, t1, t2 phases
        var isActive = state.phase !== 't0' && state.phase !== 'dissolve';
        var activeId = isActive ? PROJECTS[state.projectIndex].id : null;

        if (activeId !== currentActiveId) {
          // Contract previous project if expanded
          if (currentActiveId && isExpanded) {
            contractFromFullscreen();
          }

          currentActiveId = activeId;

          if (activeId) {
            // Dim non-active cells
            projectCells.forEach(function (cell) {
              var match = cell.dataset.project === activeId;
              gsap.to(cell, {
                opacity: match ? 1 : CONFIG.grid.inactiveOpacity,
                duration: 1.0,
                ease: CONFIG.ease.fadeIn,
              });
            });
            // Expand hero to fullscreen
            expandToFullscreen(activeId);
          } else {
            // T₀ / dissolve — all cells at full opacity
            projectCells.forEach(function (cell) {
              gsap.to(cell, {
                opacity: 1,
                duration: 1.0,
                ease: CONFIG.ease.fadeIn,
              });
            });
          }
        }

        requestAnimationFrame(updateGridOpacity);
      }

      // Need to re-query after grid blocks are built (cells are inside blockA + blockB)
      requestAnimationFrame(function () {
        projectCells = document.querySelectorAll('.grid__cell[data-project]');
        console.log('[DX] Project-aware cells:', projectCells.length);
        updateGridOpacity();
      });

      // =============================================
      // 7. Auto-refresh for memory leak prevention
      // =============================================

      setTimeout(() => {
        window.location.reload();
      }, CONFIG.autoRefreshInterval);

      console.log('[DX] Field Studies — Right screen loaded');
      console.log('[DX] Projects:', PROJECTS.length);
      console.log('[DX] Total cells:', cells.length);

    })();
  </script>

</body>
</html>
