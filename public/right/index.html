<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>Field Studies — Right Screen</title>
  <script>
    // Wall-mount rotation: `?rotate=cw` means the physical TV is mounted
    // rotated 90° clockwise, so counter-rotate the body. Run before the
    // stylesheet so there is no pre-rotation flash.
    if (new URLSearchParams(location.search).get('rotate') === 'cw') {
      document.documentElement.classList.add('rotated');
    }
  </script>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    /* ========================================
       Screen Right — Layout
       ======================================== */

    body {
      background-color: var(--black);
    }

    .screen-right {
      width: var(--screen-w);
      height: var(--screen-h);
      position: relative;
      overflow: hidden;
      background-color: var(--black);
    }

    /* --- Grid fills the entire screen --- */

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      padding: 14px;
      gap: 14px;
    }

    /* --- Cells --- */

    .grid__cell {
      position: relative;
      overflow: hidden;
      /* Each cell is its own paint/layout boundary — smart-TV compositors
         can then skip checking siblings when one cell's clip-path animates. */
      contain: layout paint;
    }

    .grid__cell-inner {
      position: absolute;
      inset: 0 0 22px 0;
      clip-path: inset(0 0 100% 0);
      transform: scale(1.08);
      will-change: clip-path, transform;
    }

    .grid__cell-image {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: top left;
    }

    /* Project code — in reserved area below image */
    .grid__cell-code {
      position: absolute;
      bottom: 0;
      right: 0;
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 13px;
      line-height: 22px;
      letter-spacing: 0.02em;
      color: var(--white);
      white-space: nowrap;
    }

    /* --- Floating composition layer (T0 → T5) --- */

    .fs-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      /* Isolate this layer from outside compositing — smart-TV browsers
         can then treat it as a self-contained surface during scroll. */
      contain: layout paint size;
      isolation: isolate;
    }

    .fs-layer img {
      position: absolute;
      display: block;
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform, clip-path, opacity;
    }
  </style>
</head>
<body>

  <div class="screen-right" id="screenRight">

    <div class="grid" id="grid">
      <!-- All cells generated by JS -->
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/projects.js"></script>
  <script src="../shared/timeline.js"></script>
  <script src="../shared/sync.js"></script>
  <script>
    (function () {
      'use strict';

      var grid = document.getElementById('grid');
      var screenRight = document.getElementById('screenRight');

      // =============================================
      // 1. Cloudinary helper + Palette
      // =============================================

      /**
       * Insert Cloudinary transformations into a URL.
       * For non-Cloudinary URLs (local paths), returns as-is.
       * @param {string} url — base Cloudinary URL or local path
       * @param {number} w — target width
       * @param {number} [h] — optional target height
       */
      function cldImg(url, w, h) {
        if (!url || url.indexOf('res.cloudinary.com') === -1) return url;
        var parts = ['w_' + w];
        if (h) parts.push('h_' + h);
        parts.push('c_limit', 'q_auto', 'f_auto');
        return url.replace('/upload/', '/upload/' + parts.join(',') + '/');
      }

      // Thumbnail width — the 6-col grid renders cells at ~164px wide,
      // so 320 gives the browser a ~2× oversample to downsample from.
      // Fetching at 150 caused visible upscaling (sgranata).
      var THUMB_W = 320;
      // Floater max dimensions — the scroll band is ~700px wide and the
      // screen is 1920 tall, so fetching larger than 800×1920 just burns
      // smart-TV GPU memory and decode time. `c_limit` keeps natural
      // aspect; smaller dimension is whichever fits first.
      var FULL_W = 800;
      var FULL_H = 1920;

      var FALLBACK_BG = 'rgba(0,0,0,0.05)';

      // =============================================
      // 2. Build cell data — one hero per project
      // =============================================

      var cells = [];

      PROJECTS.forEach(function (project, pi) {
        cells.push({ projectId: project.id, projectIndex: pi, globalIndex: pi });
      });

      // =============================================
      // 3. Calculate grid dimensions to fit screen
      // =============================================

      var SCREEN_W = 1080;
      var SCREEN_H = 1920;
      var GAP = 14;
      var PAD = 14;
      var CODE_HEIGHT = 22; // space reserved below image for project code
      var totalCells = cells.length;

      // Find optimal column count so all cells fit in the screen height
      var cols = 4;
      for (var tryCol = 4; tryCol <= 20; tryCol++) {
        var rows = Math.ceil(totalCells / tryCol);
        var availW = SCREEN_W - PAD * 2 - GAP * (tryCol - 1);
        var cellW = availW / tryCol;
        var cellH = cellW * (28 / 21) + CODE_HEIGHT; // 21:28 image + code area
        var totalH = PAD * 2 + rows * cellH + GAP * (rows - 1);
        if (totalH <= SCREEN_H) {
          cols = tryCol;
          break;
        }
      }

      var rows = Math.ceil(totalCells / cols);
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';

      console.log('[DX] Grid:', cols + '×' + rows, '=', cols * rows, 'slots for', totalCells, 'images');

      // =============================================
      // 4. Render cells
      // =============================================

      var allInners = [];

      cells.forEach(function (cell) {
        var el = document.createElement('div');
        el.className = 'grid__cell';
        el.dataset.project = cell.projectId;

        var inner = document.createElement('div');
        inner.className = 'grid__cell-inner';

        var project = PROJECTS[cell.projectIndex];
        var imgSrc = cldImg(project.images.hero, THUMB_W);

        // Image — `decoding="async"` + a background `decode()` call so
        // all 36 thumbs are pre-rasterized before the curtain-down
        // reveal runs. Otherwise decode cost lands inside the
        // animation frame and causes "fatica" on the smart-TV GPU.
        var img = document.createElement('img');
        img.className = 'grid__cell-image';
        img.decoding = 'async';
        img.src = imgSrc;
        img.alt = project.title;
        img.onerror = function () {
          // Missing image — show neutral fallback
          this.style.display = 'none';
          inner.style.backgroundColor = FALLBACK_BG;
        };
        if (typeof img.decode === 'function') {
          img.decode().catch(function () {});
        }
        inner.appendChild(img);

        el.appendChild(inner);

        // Project code — bottom-right inside cell
        var code = document.createElement('span');
        code.className = 'grid__cell-code';
        code.textContent = project.code;
        el.appendChild(code);

        grid.appendChild(el);
        allInners.push(inner);
      });

      // =============================================
      // 5. GSAP promise helpers
      // =============================================

      function animate(target, vars) {
        return new Promise(function (resolve) {
          vars.onComplete = resolve;
          gsap.to(target, vars);
        });
      }

      function delay(sec) {
        return new Promise(function (resolve) {
          setTimeout(resolve, sec * 1000);
        });
      }

      /**
       * Offset of an element relative to an ancestor, ignoring CSS transforms
       * (unlike getBoundingClientRect which returns post-transform viewport
       * coords). Required so the DX scroll geometry stays correct when the
       * whole page is rotated via `?rotate=cw` for wall-mounted TVs.
       */
      function offsetRect(el, ancestor) {
        var x = 0, y = 0;
        var cur = el;
        while (cur && cur !== ancestor) {
          x += cur.offsetLeft;
          y += cur.offsetTop;
          cur = cur.offsetParent;
          if (!cur) break;
        }
        return { x: x, y: y, w: el.offsetWidth, h: el.offsetHeight };
      }

      // =============================================
      // 6. Grid reveal / hide
      // =============================================

      var allCellEls = Array.from(grid.querySelectorAll('.grid__cell'));

      /** Reveal all cells with wave stagger */
      function revealAll() {
        allInners.forEach(function (inner, i) {
          gsap.to(inner, {
            clipPath: 'inset(0% 0 0 0)',
            scale: 1,
            duration: 0.6,
            ease: 'power2.out',
            delay: 0.03 * i,
            overwrite: true,
          });
        });
      }

      /** T-1: Hide non-project cells (curtain up, bottom → top) with wave stagger. */
      function hideNonProject(activeProjectId) {
        var dur = 0.5;
        var stagger = 0.025;
        var idx = 0;
        allCellEls.forEach(function (cell) {
          if (cell.dataset.project !== activeProjectId) {
            gsap.fromTo(
              cell.querySelector('.grid__cell-inner'),
              { clipPath: 'inset(0% 0% 0% 0%)', scale: 1 },
              {
                clipPath: 'inset(0% 0% 100% 0%)',
                scale: 1.08,
                duration: dur,
                delay: idx * stagger,
                ease: 'power2.in',
                overwrite: true,
                immediateRender: false,
              }
            );
            idx++;
          }
        });
        return delay(dur + idx * stagger + 0.05);
      }

      /** T6: Reveal all non-project cells — curtain down (top → bottom), wave stagger. */
      function revealNonProject(activeProjectId) {
        var staggerIdx = 0;
        allCellEls.forEach(function (cell) {
          if (activeProjectId && cell.dataset.project === activeProjectId) return;
          var inner = cell.querySelector('.grid__cell-inner');
          gsap.fromTo(
            inner,
            { clipPath: 'inset(0% 0% 100% 0%)', scale: 1.08 },
            {
              clipPath: 'inset(0% 0% 0% 0%)',
              scale: 1,
              duration: 1.0,
              ease: 'power3.out',
              delay: 0.04 * staggerIdx,
              overwrite: true,
              immediateRender: false,
            }
          );
          staggerIdx++;
        });
        return 1.0 + 0.04 * staggerIdx;
      }

      // Initial reveal
      revealAll();

      // =============================================
      // 7. Project cycle — vertical scroll storyboard
      // =============================================

      /**
       * Preload image, pre-decode to bitmap, and return natural dimensions.
       * Using `img.decode()` (where supported) means the smart-TV main
       * thread isn't stalled decoding JPEGs at the moment the floater is
       * added to the DOM — one less source of scroll glitching.
       */
      function preloadImageWithSize(url) {
        return new Promise(function (resolve) {
          var tmp = new Image();
          tmp.decoding = 'async';
          function done() {
            resolve({ url: url, w: tmp.naturalWidth || 1080, h: tmp.naturalHeight || 1440 });
          }
          tmp.onload = function () {
            if (typeof tmp.decode === 'function') {
              tmp.decode().then(done, done);
            } else {
              done();
            }
          };
          tmp.onerror = function () {
            resolve({ url: url, w: 1080, h: 1440 });
          };
          tmp.src = url;
        });
      }

      var currentActiveId = null;
      var cycleIdCounter = 0;
      var activeCycleId = 0;
      var cycleCompleted = false;
      var activeLayer = null;
      var activeHeroInner = null;

      function cleanupCycle() {
        if (activeLayer && activeLayer.parentNode) {
          activeLayer.parentNode.removeChild(activeLayer);
        }
        if (activeHeroInner) {
          gsap.set(activeHeroInner, { opacity: 1 });
        }
        // Ensure the grid is visible again even if a cycle was aborted
        // mid-T3 (we hide it during scroll for compositor performance).
        grid.style.visibility = '';
        activeLayer = null;
        activeHeroInner = null;
      }

      async function cycleProject(projectId, projectIndex) {
        var myId = ++cycleIdCounter;
        activeCycleId = myId;
        cycleCompleted = false;
        function live() { return activeCycleId === myId; }

        var project = PROJECTS[projectIndex];
        var cellEl = allCellEls.find(function (c) { return c.dataset.project === projectId; });
        if (!cellEl) return;

        var innerEl = cellEl.querySelector('.grid__cell-inner');
        var heroImgEl = innerEl.querySelector('.grid__cell-image');

        var imgUrls = [project.images.hero].concat(project.images.gallery || []);

        // T-1: hide non-hero cells (curtain up)
        await hideNonProject(projectId);
        if (!live()) return;

        // Preload all images with natural dimensions. Cap both
        // dimensions at Cloudinary so decode + GPU memory on the smart
        // TV match the actual display size instead of the source.
        var imgData = await Promise.all(imgUrls.map(function (url) {
          return preloadImageWithSize(cldImg(url, FULL_W, FULL_H));
        }));
        if (!live()) return;

        // Measure hero thumbnail rect (actual rendered image, not cell box).
        // Uses `offsetRect` so geometry stays correct when the page is
        // rotated via `?rotate=cw` for wall-mounted TVs.
        var heroRect = offsetRect(heroImgEl, screenRight);

        // Scroll geometry: measure actual rendered rects of grid cols 2 and 5
        // in row 0, so the scroll band aligns pixel-exact with the underlying
        // grid regardless of rounding in the CSS `1fr` distribution.
        var firstRowCells = allCellEls.slice(0, cols);
        var col2Rect = offsetRect(firstRowCells[1], screenRight);
        var col5Rect = offsetRect(firstRowCells[4], screenRight);
        var SCROLL_LEFT = col2Rect.x;
        var SCROLL_W = (col5Rect.x + col5Rect.w) - col2Rect.x;
        var GAP_V = 10; // vertical spacing between stacked images

        // Per-image render box — fit to SCROLL_W, cap height at SCREEN_H.
        imgData.forEach(function (d) {
          var w = SCROLL_W;
          var h = SCROLL_W * (d.h / d.w);
          if (h > SCREEN_H) {
            h = SCREEN_H;
            w = SCREEN_H * (d.w / d.h);
          }
          d.renderW = w;
          d.renderH = h;
          d.slotLeft = SCROLL_LEFT + (SCROLL_W - w) / 2;
        });

        // Baseline Y for each image — hero centered on screen, others
        // stacked below with GAP_V between.
        var baselineY = [];
        baselineY[0] = (SCREEN_H - imgData[0].renderH) / 2;
        for (var bi = 1; bi < imgData.length; bi++) {
          baselineY[bi] = baselineY[bi - 1] + imgData[bi - 1].renderH + GAP_V;
        }

        // Create floating layer
        var layer = document.createElement('div');
        layer.className = 'fs-layer';
        screenRight.appendChild(layer);
        activeLayer = layer;
        activeHeroInner = innerEl;

        // Place all images at their baseline layout slot (left/top/width/height
        // set once, never animated — layout stays stable). The hero gets an
        // initial transform that visually aligns it over its grid thumb, so
        // T1 only has to animate transform (GPU) back to identity.
        var floaters = imgData.map(function (data, i) {
          var el = document.createElement('img');
          el.decoding = 'async';
          el.src = data.url;
          layer.appendChild(el);
          gsap.set(el, {
            left: data.slotLeft,
            top: baselineY[i],
            width: data.renderW,
            height: data.renderH,
          });
          if (i === 0) {
            // Hero: scale+translate so it renders aligned over the thumb.
            // Uniform scale works because thumb and fullscreen share the
            // image's natural aspect ratio.
            var scale = heroRect.w / data.renderW;
            var tx = heroRect.x - data.slotLeft - (data.renderW - heroRect.w) / 2;
            var ty = heroRect.y - baselineY[i] - (data.renderH - heroRect.h) / 2;
            gsap.set(el, { x: tx, y: ty, scale: scale, opacity: 1 });
          } else {
            // Non-hero: at baseline but invisible until T2 curtains them in.
            gsap.set(el, { x: 0, y: 0, opacity: 0 });
          }
          return { el: el, data: data };
        });
        var allFloaterEls = floaters.map(function (f) { return f.el; });

        // T0: swap grid thumb → floating hero
        gsap.set(innerEl, { opacity: 0 });

        // T1: hero transform back to identity (translate 0, scale 1). No
        // layout props animated, so the compositor can keep a single
        // rasterized layer and just re-transform it — smooth on-GPU.
        await animate(floaters[0].el, {
          x: 0,
          y: 0,
          scale: 1,
          duration: 1.0,
          ease: 'power2.inOut',
        });
        if (!live()) return;

        // T2: reveal non-hero images now that hero has settled —
        // fade combined with curtain-down (top → bottom unveil).
        // Uses fromTo + immediateRender:false (same pattern as grid curtains)
        // so GSAP has explicit, consistent-unit endpoints for clipPath.
        // Clip-path is cleared on completion so T3 scroll doesn't pay
        // the per-frame clip cost (smart-TV GPUs are sensitive to it).
        if (floaters.length > 1) {
          var nonHeroEls = floaters.slice(1).map(function (f) { return f.el; });
          await new Promise(function (resolve) {
            gsap.fromTo(nonHeroEls,
              { opacity: 0, clipPath: 'inset(0% 0% 100% 0%)' },
              {
                opacity: 1,
                clipPath: 'inset(0% 0% 0% 0%)',
                duration: 0.8,
                ease: 'power2.out',
                immediateRender: false,
                onComplete: resolve,
              }
            );
          });
          if (!live()) return;
        }

        // Normalize every floater before scrolling: no clip-path, and
        // will-change narrowed to transform only. Smart-TV compositors
        // pay per-frame cost for clip-path even when fully open, and a
        // broad will-change hint discourages layer caching.
        allFloaterEls.forEach(function (el) {
          el.style.clipPath = 'none';
          el.style.willChange = 'transform';
        });

        // Nothing in the grid is visible during scroll (all cells are
        // curtain-up, hero lives on the floater layer). Hiding the grid
        // wholesale stops the compositor from walking its 36 clipped
        // cells every frame.
        grid.style.visibility = 'hidden';

        // T3: drift-then-transition per image.
        //   drift — 2 s linear slow crawl (min velocity, never fully 0)
        //   transition — 1 s ease.inOut to the next image's center
        // Last image's transition pushes it off the top.
        var DRIFT_DIST = 40;
        var DRIFT_DUR  = 2.0;
        var TRANS_DUR  = 1.0;

        for (var i = 0; i < imgData.length; i++) {
          // The last image is about to drift at centre — give SX a head
          // start so its accordion-close + sweep-to-next overlap with
          // our remaining drift/transition/T6 instead of running after.
          if (i === imgData.length - 1 && SYNC.isAuthoritative()) {
            SYNC.broadcastProjectEnd(projectIndex, projectId);
          }

          await animate(allFloaterEls, {
            y: '-=' + DRIFT_DIST,
            duration: DRIFT_DUR,
            ease: 'none',
          });
          if (!live()) return;

          var transDist;
          if (i === imgData.length - 1) {
            // Push last image off the top
            transDist = imgData[i].renderH / 2 + SCREEN_H / 2 - DRIFT_DIST;
          } else {
            var stepDist = imgData[i].renderH / 2 + GAP_V + imgData[i + 1].renderH / 2;
            transDist = stepDist - DRIFT_DIST;
          }

          await animate(allFloaterEls, {
            y: '-=' + transDist,
            duration: TRANS_DUR,
            ease: 'power2.inOut',
          });
          if (!live()) return;
        }

        // T5: tear down floating layer; prep active cell for reveal sweep
        gsap.set(innerEl, { clipPath: 'inset(0 0 100% 0)', scale: 1.08, opacity: 1 });
        if (layer.parentNode) layer.parentNode.removeChild(layer);
        activeLayer = null;
        activeHeroInner = null;

        // Grid comes back into the paint tree before the reveal sweep.
        grid.style.visibility = '';

        await delay(0.2);
        if (!live()) return;

        // T6: reveal all cells (including active) — curtain down wave
        revealNonProject(null);
        cycleCompleted = true;

        // Apply any project_start that arrived while we were finishing
        // (SX tends to outrun T6 when close + sweep is short), or clear
        // the pin so the grid stays as the idle state.
        if (pendingStart) {
          var queued = pendingStart;
          pendingStart = null;
          applyStart(queued);
        } else {
          syncPinnedIndex = null;
        }
      }

      // =============================================
      // 8. State machine — sync-driven (PartyKit) or TIMELINE fallback
      // =============================================

      // When sync is authoritative, SX's project_start pins the active
      // index here; cycleProject clears it (or swaps in a pending one)
      // after T6 completes. Without sync we fall back to TIMELINE.
      var syncPinnedIndex = null;
      // A project_start that arrived before our own T6 finished — we
      // hold it so updateGridState can't abort the reveal animation.
      var pendingStart = null;

      function applyStart(msg) {
        var expected = PROJECTS[msg.index] && PROJECTS[msg.index].id;
        if (msg.id && expected && msg.id !== expected) {
          console.warn('[DX] project_start id mismatch — index', msg.index,
                       'expected', expected, 'got', msg.id);
        }
        syncPinnedIndex = msg.index;
      }

      SYNC.on('project_start', function (msg) {
        if (typeof msg.index !== 'number') return;
        // If we're mid-cycle but haven't reached T6 yet, buffer — letting
        // updateGridState switch now would kill the reveal animation.
        if (currentActiveId !== null && !cycleCompleted) {
          pendingStart = msg;
          return;
        }
        applyStart(msg);
      });

      // SX rebroadcasts its current project every heartbeatMs. We use it
      // as a safety-net converger: if we ever drift out of sync (missed
      // start, stale reconnect replay, WebSocket blip), the next heartbeat
      // pulls us back in line.
      SYNC.on('heartbeat', function (msg) {
        if (msg.index === null || msg.index === undefined) {
          // SX is between projects. Clear our pin only if we're also
          // idle — otherwise let the running cycle finish naturally.
          if (currentActiveId === null && syncPinnedIndex !== null) {
            syncPinnedIndex = null;
          }
          return;
        }
        if (typeof msg.index !== 'number') return;
        // Same rules as project_start: buffer if mid-cycle with a
        // different index, apply directly when idle or matching.
        if (currentActiveId !== null && !cycleCompleted) {
          if (syncPinnedIndex !== msg.index) {
            pendingStart = msg;
          }
          return;
        }
        if (syncPinnedIndex !== msg.index) {
          console.log('[DX] heartbeat resync', syncPinnedIndex, '→', msg.index);
          applyStart(msg);
        }
      });

      function updateGridState() {
        var state;
        if (SYNC.isAuthoritative()) {
          state = syncPinnedIndex !== null
            ? { projectIndex: syncPinnedIndex, phase: 't1' }
            : { projectIndex: 0, phase: 't0' };
        } else {
          state = TIMELINE.getState();
        }

        var isActive = state.phase !== 't0' && state.phase !== 'dissolve';
        var activeId = isActive ? PROJECTS[state.projectIndex].id : null;

        if (activeId !== currentActiveId) {
          var prevId = currentActiveId;
          var wasCompleted = cycleCompleted;

          // Invalidate any running cycle — its `live()` checks will now fail.
          activeCycleId++;
          cleanupCycle();

          // Only force-reveal if cycleProject didn't already run T6 naturally.
          // Avoids jarring double animation at end of each project.
          if (prevId && !wasCompleted) {
            revealNonProject(prevId);
          }
          cycleCompleted = false;

          currentActiveId = activeId;

          if (activeId) {
            cycleProject(activeId, state.projectIndex);
          }
        }

        requestAnimationFrame(updateGridState);
      }

      SYNC.connect('dx');
      requestAnimationFrame(updateGridState);

      // =============================================
      // 9. Auto-refresh
      // =============================================

      setTimeout(function () {
        window.location.reload();
      }, CONFIG.autoRefreshInterval);

      console.log('[DX] Field Studies — Right screen loaded');
      console.log('[DX] Total cells:', totalCells);

    })();
  </script>

</body>
</html>
