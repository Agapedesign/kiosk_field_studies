<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1">
  <title>Field Studies — Right Screen</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    /* ========================================
       Screen Right — Layout
       ======================================== */

    body {
      background-color: var(--white);
    }

    .screen-right {
      width: var(--screen-w);
      height: var(--screen-h);
      position: relative;
      overflow: hidden;
      background-color: var(--white);
    }

    /* --- Grid fills the entire screen --- */

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      padding: 14px;
      gap: 14px;
    }

    /* --- Cells --- */

    .grid__cell {
      position: relative;
      overflow: hidden;
    }

    .grid__cell-inner {
      position: absolute;
      inset: 0 0 16px 0;
      clip-path: inset(0 0 100% 0);
      transform: scale(1.08);
      will-change: clip-path, transform;
    }

    .grid__cell-image {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: top left;
    }

    /* Project code — in reserved area below image */
    .grid__cell-code {
      position: absolute;
      bottom: 0;
      right: 0;
      font-family: var(--font-family);
      font-weight: 400;
      font-size: 7px;
      line-height: 16px;
      color: #000;
      white-space: nowrap;
    }

    /* --- Fullscreen image overlay (T₁) --- */

    .fullscreen-image {
      position: absolute;
      inset: 0;
      background-color: var(--white);
      opacity: 0;
      visibility: hidden;
      z-index: 10;
    }

    .fullscreen-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="screen-right" id="screenRight">

    <div class="grid" id="grid">
      <!-- All cells generated by JS -->
    </div>

    <div class="fullscreen-image" id="fullscreenImage">
      <img id="fullscreenImg" src="" alt="">
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/projects.js"></script>
  <script src="../shared/timeline.js"></script>
  <script>
    (function () {
      'use strict';

      var grid = document.getElementById('grid');
      var screenRight = document.getElementById('screenRight');

      // =============================================
      // 1. Cloudinary helper + Palette
      // =============================================

      /**
       * Insert Cloudinary transformations into a URL.
       * For non-Cloudinary URLs (local paths), returns as-is.
       * @param {string} url — base Cloudinary URL or local path
       * @param {number} w — target width
       * @param {number} [h] — optional target height
       */
      function cldImg(url, w, h) {
        if (!url || url.indexOf('res.cloudinary.com') === -1) return url;
        var transform = h
          ? 'w_' + w + ',h_' + h + ',c_fill,q_auto,f_auto'
          : 'w_' + w + ',c_limit,q_auto,f_auto';
        return url.replace('/upload/', '/upload/' + transform + '/');
      }

      // Thumbnail width — matches actual cell size (~140px)
      var THUMB_W = 150;
      // Fullscreen width
      var FULL_W = 1080;
      var FULL_H = 1920;

      var FALLBACK_BG = 'rgba(0,0,0,0.05)';

      // =============================================
      // 2. Build cell data — one hero per project
      // =============================================

      var cells = [];

      PROJECTS.forEach(function (project, pi) {
        cells.push({ projectId: project.id, projectIndex: pi, globalIndex: pi });
      });

      // =============================================
      // 3. Calculate grid dimensions to fit screen
      // =============================================

      var SCREEN_W = 1080;
      var SCREEN_H = 1920;
      var GAP = 14;
      var PAD = 14;
      var CODE_HEIGHT = 16; // space reserved below image for project code
      var totalCells = cells.length;

      // Find optimal column count so all cells fit in the screen height
      var cols = 4;
      for (var tryCol = 4; tryCol <= 20; tryCol++) {
        var rows = Math.ceil(totalCells / tryCol);
        var availW = SCREEN_W - PAD * 2 - GAP * (tryCol - 1);
        var cellW = availW / tryCol;
        var cellH = cellW * (28 / 21) + CODE_HEIGHT; // 21:28 image + code area
        var totalH = PAD * 2 + rows * cellH + GAP * (rows - 1);
        if (totalH <= SCREEN_H) {
          cols = tryCol;
          break;
        }
      }

      var rows = Math.ceil(totalCells / cols);
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';

      console.log('[DX] Grid:', cols + '×' + rows, '=', cols * rows, 'slots for', totalCells, 'images');

      // =============================================
      // 4. Render cells
      // =============================================

      var allInners = [];

      cells.forEach(function (cell) {
        var el = document.createElement('div');
        el.className = 'grid__cell';
        el.dataset.project = cell.projectId;

        var inner = document.createElement('div');
        inner.className = 'grid__cell-inner';

        var project = PROJECTS[cell.projectIndex];
        var imgSrc = cldImg(project.images.hero, THUMB_W);

        // Image
        var img = document.createElement('img');
        img.className = 'grid__cell-image';
        img.src = imgSrc;
        img.alt = project.title;
        img.onerror = function () {
          // Missing image — show neutral fallback
          this.style.display = 'none';
          inner.style.backgroundColor = FALLBACK_BG;
        };
        inner.appendChild(img);

        el.appendChild(inner);

        // Project code — bottom-right inside cell
        var code = document.createElement('span');
        code.className = 'grid__cell-code';
        code.textContent = project.code;
        el.appendChild(code);

        grid.appendChild(el);
        allInners.push(inner);
      });

      // =============================================
      // 5. GSAP promise helpers
      // =============================================

      function animate(target, vars) {
        return new Promise(function (resolve) {
          vars.onComplete = resolve;
          gsap.to(target, vars);
        });
      }

      function delay(sec) {
        return new Promise(function (resolve) {
          setTimeout(resolve, sec * 1000);
        });
      }

      // =============================================
      // 6. Grid reveal / hide
      // =============================================

      var allCellEls = Array.from(grid.querySelectorAll('.grid__cell'));

      /** Reveal all cells with wave stagger */
      function revealAll() {
        allInners.forEach(function (inner, i) {
          gsap.to(inner, {
            clipPath: 'inset(0% 0 0 0)',
            scale: 1,
            duration: 0.6,
            ease: 'power2.out',
            delay: 0.03 * i,
            overwrite: true,
          });
        });
      }

      /** Hide non-project cells (curtain falls down). Returns a promise when done. */
      function hideNonProject(activeProjectId) {
        var dur = 0.6;
        allCellEls.forEach(function (cell) {
          if (cell.dataset.project !== activeProjectId) {
            gsap.to(cell.querySelector('.grid__cell-inner'), {
              clipPath: 'inset(100% 0 0 0)',
              scale: 1.08,
              duration: dur,
              ease: 'power2.in',
              overwrite: true,
            });
          }
        });
        return delay(dur + 0.1);
      }

      /** Reveal all hidden cells back with wave stagger */
      function revealNonProject(activeProjectId) {
        var staggerIdx = 0;
        allCellEls.forEach(function (cell) {
          if (activeProjectId && cell.dataset.project === activeProjectId) return;
          var inner = cell.querySelector('.grid__cell-inner');
          gsap.to(inner, {
            clipPath: 'inset(0% 0 0 0)',
            scale: 1,
            duration: 0.6,
            ease: 'power2.out',
            delay: 0.03 * staggerIdx,
            overwrite: true,
          });
          staggerIdx++;
        });
        // Return total duration for sequencing
        return 0.6 + 0.03 * staggerIdx;
      }

      // Initial reveal
      revealAll();

      // =============================================
      // 7. Fullscreen expand / contract (promise-based)
      // =============================================

      var fullscreenEl = document.getElementById('fullscreenImage');
      var fullscreenImg = document.getElementById('fullscreenImg');

      function cellClipPath(cell) {
        var sr = screenRight.getBoundingClientRect();
        var cr = cell.getBoundingClientRect();
        var top    = (cr.top - sr.top) / sr.height * 100;
        var right  = 100 - (cr.right - sr.left) / sr.width * 100;
        var bottom = 100 - (cr.bottom - sr.top) / sr.height * 100;
        var left   = (cr.left - sr.left) / sr.width * 100;
        return 'inset(' + top + '% ' + right + '% ' + bottom + '% ' + left + '%)';
      }

      function expandFromCell(cellEl, rawSrc, pi) {
        var clip = cellClipPath(cellEl);
        fullscreenImg.src = cldImg(rawSrc, FULL_W, FULL_H);
        fullscreenEl.style.backgroundColor = FALLBACK_BG;
        gsap.set(fullscreenEl, { visibility: 'visible', opacity: 1, clipPath: clip });
        return animate(fullscreenEl, {
          clipPath: 'inset(0% 0% 0% 0%)',
          duration: CONFIG.imageExpand.duration,
          ease: CONFIG.ease.imageExpand,
        });
      }

      function contractToCell(cellEl) {
        var clip = cellClipPath(cellEl);
        return animate(fullscreenEl, {
          clipPath: clip,
          duration: CONFIG.imageExpand.duration * 0.7,
          ease: CONFIG.ease.imageExpand,
        }).then(function () {
          gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
        });
      }

      // =============================================
      // 8. Project cycle — iterate through images
      // =============================================

      var currentActiveId = null;
      var cycleAborted = false;

      /** Preload an image URL, resolve when ready (or on error). */
      function preloadImage(url) {
        return new Promise(function (resolve) {
          var tmp = new Image();
          tmp.onload = tmp.onerror = function () { resolve(url); };
          tmp.src = url;
        });
      }

      /** Curtain down — reveal new image from top */
      function curtainDown(rawSrc, pi) {
        var url = cldImg(rawSrc, FULL_W, FULL_H);
        return preloadImage(url).then(function () {
          fullscreenImg.src = url;
          fullscreenEl.style.backgroundColor = FALLBACK_BG;
          gsap.set(fullscreenEl, { visibility: 'visible', opacity: 1, clipPath: 'inset(0 0 100% 0)' });
          return animate(fullscreenEl, {
            clipPath: 'inset(0% 0% 0% 0%)',
            duration: 1.0,
            ease: 'power2.inOut',
          });
        });
      }

      /** Curtain up — hide current image upward */
      function curtainUp() {
        return animate(fullscreenEl, {
          clipPath: 'inset(100% 0 0 0)',
          duration: 1.0,
          ease: 'power2.inOut',
        }).then(function () {
          gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
        });
      }

      async function cycleProject(projectId, projectIndex) {
        var project = PROJECTS[projectIndex];
        var cellEl = allCellEls.find(function (c) {
          return c.dataset.project === projectId;
        });
        if (!cellEl) return;

        // All images: hero + gallery
        var images = [project.images.hero];
        project.images.gallery.forEach(function (g) { images.push(g); });

        // Preload all fullscreen sizes upfront for this project
        images.forEach(function (src) { preloadImage(cldImg(src, FULL_W, FULL_H)); });

        for (var i = 0; i < images.length; i++) {
          if (cycleAborted) return;

          if (i === 0) {
            // First image: expand from cell
            await expandFromCell(cellEl, images[i], projectIndex);
          } else {
            // Subsequent images: curtain down
            await curtainDown(images[i], projectIndex);
          }
          if (cycleAborted) return;

          // Hold
          await delay(CONFIG.t2.durationPerImage);
          if (cycleAborted) return;

          if (i === images.length - 1) {
            // Last image: contract back to cell
            await contractToCell(cellEl);
          } else {
            // Between images: curtain up, brief pause
            await curtainUp();
            if (cycleAborted) return;
            await delay(0.3);
          }
        }
      }

      // =============================================
      // 9. State machine — poll TIMELINE, trigger cycle
      // =============================================

      function updateGridState() {
        var state = TIMELINE.getState();
        var isActive = state.phase !== 't0' && state.phase !== 'dissolve';
        var activeId = isActive ? PROJECTS[state.projectIndex].id : null;

        if (activeId !== currentActiveId) {
          // Abort running cycle
          cycleAborted = true;

          if (currentActiveId && !activeId) {
            // Back to T₀ — contract fullscreen into cell, then wave-reveal others
            var prevId = currentActiveId;
            var prevCell = allCellEls.find(function (c) {
              return c.dataset.project === prevId;
            });
            if (prevCell && fullscreenEl.style.visibility === 'visible') {
              contractToCell(prevCell).then(function () {
                revealNonProject(prevId);
              });
            } else {
              gsap.set(fullscreenEl, { visibility: 'hidden', opacity: 0, clipPath: '' });
              revealNonProject(prevId);
            }
          }

          currentActiveId = activeId;

          if (activeId) {
            var pi = state.projectIndex;
            cycleAborted = false;

            // 1) Hide non-project cells → 2) cycle through project images
            hideNonProject(activeId).then(function () {
              if (!cycleAborted) {
                cycleProject(activeId, pi);
              }
            });
          }
        }

        requestAnimationFrame(updateGridState);
      }

      requestAnimationFrame(updateGridState);

      // =============================================
      // 10. Auto-refresh
      // =============================================

      setTimeout(function () {
        window.location.reload();
      }, CONFIG.autoRefreshInterval);

      console.log('[DX] Field Studies — Right screen loaded');
      console.log('[DX] Total cells:', totalCells);

    })();
  </script>

</body>
</html>
