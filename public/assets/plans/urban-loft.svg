<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Urban Loft — Milano — 3 products -->

  <g class="plan-perimeter" stroke="#a09a90" stroke-width="2">
    <path d="M40,40 L560,40 L560,460 L40,460 Z"/>
  </g>

  <g class="plan-partitions" stroke="#a09a90" stroke-width="1.5">
    <path d="M250,40 L250,300"/>
    <path d="M250,300 L560,300"/>
    <path d="M40,340 L250,340"/>
  </g>

  <g class="plan-fixtures" stroke="#a09a90" stroke-width="1">
    <!-- Freestanding bathtub (center of main room) -->
    <path d="M310,70 Q310,50 370,50 L440,50 Q500,50 500,70 L500,200 Q500,220 440,220 L370,220 Q310,220 310,200 Z"/>
    <!-- Washbasin (long trough) -->
    <path d="M60,60 L220,60 L220,120 L60,120 Z"/>
    <path d="M80,70 L200,70 L200,110 L80,110 Z"/>
    <!-- WC area -->
    <path d="M60,370 L140,370 L140,440 Q140,450 100,450 Q60,450 60,440 Z"/>
  </g>

  <g class="plan-dots">
    <circle cx="405" cy="135" r="14" fill="#a09a90"/>
    <text x="405" y="140" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">1</text>

    <circle cx="140" cy="90" r="14" fill="#a09a90"/>
    <text x="140" y="95" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">2</text>

    <circle cx="400" cy="380" r="14" fill="#a09a90"/>
    <text x="400" y="385" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">3</text>
  </g>
</svg>
