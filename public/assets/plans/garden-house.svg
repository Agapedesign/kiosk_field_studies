<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Garden House — Copenhagen — 5 products -->

  <g class="plan-perimeter" stroke="#a09a90" stroke-width="2">
    <path d="M40,40 L400,40 L400,160 L560,160 L560,460 L40,460 Z"/>
  </g>

  <g class="plan-partitions" stroke="#a09a90" stroke-width="1.5">
    <path d="M280,40 L280,460"/>
    <path d="M400,160 L400,460"/>
    <path d="M40,280 L280,280"/>
  </g>

  <g class="plan-fixtures" stroke="#a09a90" stroke-width="1">
    <!-- Freestanding bathtub -->
    <path d="M60,70 Q60,50 120,50 L200,50 Q260,50 260,70 L260,210 Q260,230 200,230 L120,230 Q60,230 60,210 Z"/>
    <!-- Washbasin -->
    <path d="M60,310 L180,310 L180,380 Q180,410 120,410 Q60,410 60,380 Z"/>
    <!-- Mirror -->
    <path d="M60,300 L180,300 L180,305 L60,305 Z"/>
    <!-- Shower tray -->
    <path d="M420,190 L540,190 L540,340 L420,340 Z M425,195 L535,195 L535,335 L425,335 Z"/>
    <!-- Faucet area -->
    <path d="M300,60 L380,60 L380,130 L300,130 Z"/>
  </g>

  <g class="plan-dots">
    <circle cx="160" cy="140" r="14" fill="#a09a90"/>
    <text x="160" y="145" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">1</text>

    <circle cx="120" cy="355" r="14" fill="#a09a90"/>
    <text x="120" y="360" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">2</text>

    <circle cx="120" cy="300" r="14" fill="#a09a90"/>
    <text x="120" y="305" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">3</text>

    <circle cx="340" cy="95" r="14" fill="#a09a90"/>
    <text x="340" y="100" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">4</text>

    <circle cx="480" cy="265" r="14" fill="#a09a90"/>
    <text x="480" y="270" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">5</text>
  </g>
</svg>
