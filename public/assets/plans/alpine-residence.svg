<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Alpine Residence — Kitzbuhel — 4 products -->

  <g class="plan-perimeter" stroke="#a09a90" stroke-width="2">
    <path d="M40,40 L360,40 L360,200 L560,200 L560,460 L40,460 Z"/>
  </g>

  <g class="plan-partitions" stroke="#a09a90" stroke-width="1.5">
    <path d="M40,260 L360,260"/>
    <path d="M360,40 L360,460"/>
  </g>

  <g class="plan-fixtures" stroke="#a09a90" stroke-width="1">
    <!-- Bathtub (built-in) -->
    <path d="M60,60 L330,60 L330,230 L60,230 Z M70,70 L320,70 L320,220 L70,220 Z"/>
    <!-- Double washbasin -->
    <path d="M60,290 L160,290 L160,360 Q160,390 110,390 Q60,390 60,360 Z"/>
    <path d="M200,290 L300,290 L300,360 Q300,390 250,390 Q200,390 200,360 Z"/>
    <!-- Walk-in shower -->
    <path d="M390,230 L530,230 L530,430 L390,430 Z"/>
    <!-- Bench -->
    <path d="M395,380 L525,380 L525,425 L395,425 Z"/>
  </g>

  <g class="plan-dots">
    <circle cx="195" cy="145" r="14" fill="#a09a90"/>
    <text x="195" y="150" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">1</text>

    <circle cx="110" cy="335" r="14" fill="#a09a90"/>
    <text x="110" y="340" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">2</text>

    <circle cx="250" cy="335" r="14" fill="#a09a90"/>
    <text x="250" y="340" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">3</text>

    <circle cx="460" cy="310" r="14" fill="#a09a90"/>
    <text x="460" y="315" text-anchor="middle" fill="#1a1a1a" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="13" font-weight="700">4</text>
  </g>
</svg>
